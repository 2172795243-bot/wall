<!DOCTYPE html>  <html lang="zh-CN">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">  
    <title>灵宝三高表白墙 | 管理员旗舰版 (增强优化)</title>  
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>  
<style>  
    /* 原有样式全部保留 */
    :root {  
        --primary: #0984e3; --bg-gray: #f4f7f6; --card-radius: 24px;  
        --admin-gold: #f1c40f; --danger-red: #e74c3c; --success-green: #2ecc71;  
        --text-main: #2d3436; --text-sub: #636e72; --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.08);  
    }  

    body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background-color: var(--bg-gray); padding-bottom: 90px; }  
    .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(15px); display: flex; align-items: center; z-index: 9999; border-top: 1px solid rgba(0,0,0,0.06); }  
    .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: #bdc3c7; cursor: pointer; }  
    .tab-item.active { color: var(--primary); font-weight: 800; }  
    .container { max-width: 600px; margin: 0 auto; padding: 15px; display: none; }  
    .container.active { display: block; }  
    .card { background: #fff; border-radius: var(--card-radius); padding: 20px; margin-bottom: 15px; box-shadow: var(--shadow-soft); position: relative; }  
    
    /* 新增：在线状态点样式 */
    .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; border: 2px solid #fff; }
    .dot-green { background: var(--success-green); }
    .dot-yellow { background: #f1c40f; }
    .dot-red { background: #e74c3c; }

    /* 新增：通知专区美化 */
    .notice-zone { background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: white; padding: 15px; border-radius: 20px; margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; }

    .wall-input { width: 100%; padding: 15px; border-radius: 18px; border: 2px solid #f1f3f5; background: #f8fafc; outline: none; box-sizing: border-box; }  
    .btn-confirm { background: var(--primary); color: #fff; border: none; padding: 12px 28px; border-radius: 16px; font-weight: bold; cursor: pointer; }  
    .hidden { display: none !important; }  
</style>
</head>  
<body>  

<div id="page-login" class="container active" style="margin-top: 80px;">  
    <div class="card" style="text-align: center;">  
        <h1 style="color:var(--primary);">灵宝三高表白墙</h1>  
        <input id="in-nickname" class="wall-input" placeholder="你的校友名称">  
        <button class="btn-confirm" style="width:100%; margin-top:20px;" onclick="handleLogin()">进入系统</button>  
    </div>
</div>  

<div id="app-body" class="hidden">  
    <div id="view-wall" class="container active">  
        <div class="card">  
            <textarea id="post-text" class="wall-input" style="height:100px; border:none; background:transparent;" placeholder="有什么悄悄话想说？"></textarea>  
            <button class="btn-confirm" style="float:right;" onclick="submitToWall()">发布动态</button>
            <div style="clear:both;"></div>
        </div>  
        <div id="wall-stream"></div>  
    </div>  

    <div id="view-messages" class="container">  
        <div id="notify-banner" class="notice-zone hidden" onclick="toggleNotifyDetail()">
            <span style="font-size:20px; margin-right:10px;">🔔</span>
            <div style="flex:1"><b>评论通知专区</b><div id="notify-text" style="font-size:12px;">有人回复了你...</div></div>
            <div id="notify-count" style="background:red; border-radius:10px; padding:2px 8px; font-size:10px;">0</div>
        </div>
        <div id="session-list"></div>  
    </div>  

    <div id="view-profile" class="container">  
        <div class="card" style="text-align:center;">  
            <h2 id="profile-name">...</h2>  
            <button id="btn-admin-mgr" class="btn-confirm hidden" onclick="openAdminManager()">⚙️ 管理全校成员</button>  
        </div>  
        <div id="admin-mgr-box" class="card hidden">  
            <div id="all-user-list"></div>  
        </div>  
    </div>  

    <div class="tab-bar">  
        <div class="tab-item active" onclick="switchView('wall', this)"><i>🏛️</i><span>广场</span></div>  
        <div class="tab-item" onclick="switchView('messages', this)"><i>📧</i><span>私信</span></div>  
        <div class="tab-item" onclick="switchView('profile', this)"><i>👤</i><span>我的</span></div>  
    </div>
</div>  

<script>  
    const API_URL = "https://ljopokentjagtxwdlzma.supabase.co";  
    const API_KEY = "sb_publishable_OgGGB2YH9O8rv0Vg3K8jEA_rbxA7ZHk";  
    const sango = supabase.createClient(API_URL, API_KEY);  
  
    let me = null;  
    let lastWallHtml = ""; // 性能优化：缓存对比

    async function handleLogin() {  
        const name = document.getElementById('in-nickname').value.trim();  
        if (!name) return;  
        me = { name: name, isAdmin: (name === "何梓晨") };  
        localStorage.setItem('SANGO_USER', JSON.stringify(me));  
        launchApp();  
    }  

    function launchApp() {  
        document.getElementById('page-login').style.display = 'none';  
        document.getElementById('app-body').classList.remove('hidden');  
        document.getElementById('profile-name').innerText = me.name;  
        if (me.isAdmin) document.getElementById('btn-admin-mgr').classList.remove('hidden');  
        
        // 开启心跳，支持在线状态
        updateHeartbeat();
        setInterval(updateHeartbeat, 60000); 

        renderWall();  
        syncData();  
        checkNotifications();
    }  

    // 需求1：解决卡顿 - 使用局部刷新逻辑
    async function renderWall() {  
        const { data: posts } = await sango.from('posts').select('*').order('id', {ascending:false});  
        if (!posts) return;

        let html = "";  
        posts.forEach(p => {  
            html += `<div class="card"><b>${p.username}</b>: ${p.content} <br>
                    <small style="color:var(--primary); cursor:pointer;" onclick="replyPost(${p.id}, '${p.username}')">💬 回复</small></div>`;  
        });  

        // 只有内容变了才操作DOM，减少重绘卡顿
        if (html !== lastWallHtml) {
            requestAnimationFrame(() => {
                document.getElementById('wall-stream').innerHTML = html;
                lastWallHtml = html;
            });
        }
    }  

    // 需求3：在线状态小圆点逻辑
    function getStatusDot(lastActive) {
        const diff = (new Date() - new Date(lastActive)) / 1000 / 60;
        if (diff < 2) return '<span class="status-dot dot-green"></span>';
        if (diff < 5) return '<span class="status-dot dot-yellow"></span>';
        return '<span class="status-dot dot-red"></span>';
    }

    async function openAdminManager() {  
        const box = document.getElementById('admin-mgr-box');  
        box.classList.toggle('hidden');  
        const { data } = await sango.from('profiles').select('*').order('last_active_at', {ascending:false});  
        document.getElementById('all-user-list').innerHTML = (data || []).map(u => `  
            <div style="display:flex; align-items:center; margin-bottom:10px;">  
                ${getStatusDot(u.last_active_at)}
                <b style="flex:1">${u.username}</b>  
                <button class="btn-confirm" style="padding:5px 10px; font-size:12px;">禁言</button>  
            </div>  
        `).join('');  
    }  

    // 需求2：评论通知逻辑
    async function checkNotifications() {
        const { data } = await sango.from('notifications').select('*').eq('to_user', me.name).eq('is_read', false);
        const banner = document.getElementById('notify-banner');
        if (data && data.length > 0) {
            banner.classList.remove('hidden');
            document.getElementById('notify-count').innerText = data.length;
        } else {
            banner.classList.add('hidden');
        }
    }

    async function replyPost(pid, author) {
        const val = prompt("回复 " + author + ":");
        if (!val) return;
        // 1. 发评论
        await sango.from('comments').insert([{ post_id: pid, username: me.name, content: val }]);
        // 2. 存通知
        if (author !== me.name) {
            await sango.from('notifications').insert([{ to_user: author, from_user: me.name, post_id: pid, content: val }]);
        }
        alert("回复成功");
    }

    async function updateHeartbeat() {
        if (me) await sango.from('profiles').upsert({ username: me.name, last_active_at: new Date() });
    }

    function switchView(viewId, el) {  
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));  
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));  
        document.getElementById('view-' + viewId).classList.add('active');  
        el.classList.add('active');
        if (viewId === 'wall') renderWall();
        if (viewId === 'messages') checkNotifications();
    }  

    function syncData() {  
        sango.channel('any').on('postgres_changes', { event: '*', schema: 'public' }, () => {
            renderWall();
            checkNotifications();
        }).subscribe();  
    }  
</script>  
</body>  
</html>
