<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>灵宝市第三高中表白墙 | 管理员旗舰版</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        /* ================================================================
           1. 全局视觉规范 (UI 优化版 - 保持高质感)
           ================================================================
        */
        :root {
            --primary: #0984e3;           /* 灵宝三高蓝 */
            --bg-gray: #f4f7f6;           /* 底色 */
            --card-radius: 24px;          /* 标志性圆角 */
            --admin-gold: #f1c40f;        /* 管理员金 */
            --danger-red: #e74c3c;        /* 警示红 */
            --success-green: #2ecc71;     /* 成功绿 */
            --text-main: #2d3436;         /* 主文字 */
            --text-sub: #636e72;          /* 副文字 */
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-gray);
            color: var(--text-main);
            padding-bottom: 90px; /* 为底部导航预留 */
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* ================================================================
           2. 核心导航栏 (修复点击失效的关键)
           ================================================================
        */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 75px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(0,0,0,0.06);
            z-index: 9999;
            padding-bottom: env(safe-area-inset-bottom);
            box-shadow: 0 -5px 25px rgba(0,0,0,0.04);
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: #bdc3c7;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab-item.active {
            color: var(--primary);
            font-weight: 800;
            transform: translateY(-3px);
        }

        .tab-item i {
            font-size: 24px;
            margin-bottom: 4px;
        }

        /* ================================================================
           3. 信号气泡 (在你画圈的位置 - 增强版)
           ================================================================
        */
        .red-dot-signal {
            position: absolute;
            top: 2px;
            right: 22%;
            background: var(--danger-red);
            color: #fff;
            font-size: 10px;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #fff;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(231, 76, 60, 0.3);
        }

        /* 列表里的呼吸感红点 */
        .msg-badge-pulse {
            background-color: var(--danger-red);
            color: #fff;
            font-size: 12px;
            font-weight: bold;
            min-width: 24px;
            height: 24px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #fff;
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.6); transform: scale(1); }
            70% { box-shadow: 0 0 0 12px rgba(231, 76, 60, 0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); transform: scale(1); }
        }

        /* ================================================================
           4. 布局与容器
           ================================================================
        */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 15px;
            display: none; /* 默认隐藏，由 JS 控制显示 */
        }

        .container.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: #fff;
            border-radius: var(--card-radius);
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(0,0,0,0.01);
            position: relative;
        }

        /* 管理员置顶样式 */
        .pin-notice {
            background: linear-gradient(135deg, #ffffff 0%, #fffcf0 100%);
            border: 2.5px solid var(--admin-gold);
        }

        .notice-label {
            background: var(--admin-gold);
            color: #fff;
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: 900;
            margin-right: 12px;
        }

        /* ================================================================
           5. 管理员 UI 组件
           ================================================================
        */
        .admin-tag {
            font-size: 10px;
            border: 1.5px solid var(--primary);
            color: var(--primary);
            padding: 1px 6px;
            border-radius: 5px;
            margin-left: 8px;
            font-weight: bold;
        }

        .admin-del-btn {
            color: var(--danger-red);
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 12px;
            background: rgba(231, 76, 60, 0.06);
            margin-left: auto;
        }

        .admin-panel {
            border-top: 2px dashed #f0f0f0;
            margin-top: 20px;
            padding-top: 20px;
        }

        .member-row {
            display: flex;
            align-items: center;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 18px;
            margin-bottom: 12px;
        }

        .ban-btn {
            background: #2d3436;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .ban-btn.active { background: var(--danger-red); }

        /* ================================================================
           6. 输入与交互
           ================================================================
        */
        .wall-input {
            width: 100%;
            padding: 15px;
            border-radius: 18px;
            border: 2px solid #f1f3f5;
            background: #f8fafc;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .wall-input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 5px rgba(9, 132, 227, 0.1);
        }

        .btn-confirm {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 管理员配色球 */
        .color-group { display: flex; gap: 12px; margin: 15px 0; align-items: center; }
        .color-orb { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 3px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: 0.2s; }
        .color-orb.selected { transform: scale(1.3); border-color: #2d3436; }

        .t-blue { color: #0984e3 !important; }
        .t-green { color: #2ecc71 !important; }
        .t-red { color: #e74c3c !important; }
        .t-gold { color: #f1c40f !important; }
        .t-black { color: #2d3436 !important; }

        .hidden { display: none !important; }


        .presence-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 12px;
            flex-shrink: 0;
            border: 2px solid #fff;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.75), 0 4px 12px rgba(0,0,0,0.08);
        }

        .presence-dot.online {
            background: var(--success-green);
            box-shadow: 0 0 0 3px rgba(255,255,255,0.75), 0 0 0 8px rgba(46, 204, 113, 0.16);
        }

        .presence-dot.recent {
            background: #f1c40f;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.75), 0 0 0 8px rgba(241, 196, 15, 0.14);
        }

        .presence-dot.offline {
            background: var(--danger-red);
            box-shadow: 0 0 0 3px rgba(255,255,255,0.75), 0 0 0 8px rgba(231, 76, 60, 0.12);
        }

        .member-main {
            flex: 1;
            min-width: 0;
        }

        .presence-text {
            font-size: 12px;
            color: var(--text-sub);
            margin-top: 4px;
            font-weight: 600;
        }

        .comment-zone-card {
            background: linear-gradient(135deg, #fffdf5 0%, #ffffff 100%);
            border: 2px solid rgba(241, 196, 15, 0.48);
        }

        .comment-zone-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .comment-zone-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 17px;
            font-weight: 800;
        }

        .comment-zone-count {
            background: rgba(231, 76, 60, 0.12);
            color: var(--danger-red);
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 800;
            white-space: nowrap;
        }

        .comment-zone-desc {
            color: var(--text-sub);
            font-size: 13px;
            line-height: 1.65;
            margin-bottom: 14px;
        }

        .comment-notice-list {
            display: grid;
            gap: 10px;
        }

        .comment-notice-item {
            background: rgba(255,255,255,0.95);
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 18px;
            padding: 14px 15px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .comment-notice-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            border-color: rgba(9, 132, 227, 0.18);
        }

        .comment-notice-item.unread {
            border-color: rgba(9, 132, 227, 0.18);
            background: linear-gradient(135deg, #f8fbff 0%, #ffffff 100%);
        }

        .comment-notice-item.seen {
            opacity: 0.82;
        }

        .comment-notice-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 6px;
        }

        .comment-notice-tag {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(9,132,227,0.1);
            color: var(--primary);
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 800;
        }

        .comment-notice-text {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-main);
            margin-bottom: 6px;
            word-break: break-word;
        }

        .comment-notice-post {
            font-size: 12px;
            color: var(--text-sub);
            line-height: 1.5;
        }

        .comment-notice-empty {
            text-align: center;
            padding: 26px 10px;
            color: #b2bec3;
            font-size: 14px;
        }

        .comment-reply-link {
            color: var(--primary);
            cursor: pointer;
            font-weight: 700;
        }

        .comment-anchor-flash {
            animation: anchorFlash 1.6s ease;
        }

        @keyframes anchorFlash {
            0% { box-shadow: 0 0 0 0 rgba(9, 132, 227, 0.32); }
            50% { box-shadow: 0 0 0 10px rgba(9, 132, 227, 0.08); }
            100% { box-shadow: 0 0 0 0 rgba(9, 132, 227, 0); }
        }

    </style>
</head>
<body>

<div id="page-login" class="container active" style="margin-top: 80px; display: block;">
    <div class="card" style="text-align: center; padding: 50px 30px;">
        <div id="box-avatar" style="width: 110px; height: 110px; border-radius: 50%; background: #f0f3f5; margin: 0 auto 30px; border: 3px dashed #d1d5db; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer;" onclick="document.getElementById('file-avatar').click()">
            <span id="txt-plus" style="font-size: 40px; color: #9ca3af;">+</span>
            <img id="img-avatar-pre" class="hidden" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <input type="file" id="file-avatar" hidden accept="image/*" onchange="processMedia(this, 'AVATAR')">

        <h1 style="margin:0; font-size:26px; color:var(--primary);">灵宝市第三高中</h1>
        <p style="color:var(--text-sub); font-size:14px; margin-top:5px; font-weight: bold;">校内专属表白墙系统</p>

        <div style="margin-top:40px;">
            <input id="in-nickname" class="wall-input" maxlength="15" placeholder="你的校友名称">
            <input id="in-admin-pw" class="wall-input" type="password" style="margin-top:15px;" placeholder="管理员专属密令 (可选)">
            
            <button class="btn-confirm" style="width:100%; height:55px; margin-top:25px; font-size:17px;" onclick="handleLogin()">进入三高墙</button>
        </div>
        <p style="font-size:11px; color:#cbd5e0; margin-top:20px;">文明发言，共创和谐灵宝三高</p>
    </div>
</div>

<div id="app-body" class="hidden">
    
    <div id="view-wall" class="container active">
        <div class="card">
            <div style="display:flex; align-items:flex-start;">
                <img id="my-wall-head" style="width:45px; height:45px; border-radius:50%; margin-right:15px; background:#eee;">
                <textarea id="post-text" class="wall-input" style="border:none; background:transparent; padding:0; height:100px; resize:none; font-size:18px;" placeholder="此刻，有什么悄悄话想告诉三高校友？"></textarea>
            </div>

            <div id="post-img-box" class="hidden" style="margin:15px 0;">
                <div style="position:relative; display:inline-block;">
                    <img id="img-post-pre" style="width:140px; border-radius:15px; box-shadow:0 8px 15px rgba(0,0,0,0.1);">
                    <span style="position:absolute; top:-8px; right:-8px; background:#2d3436; color:#fff; width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="clearMedia()">×</span>
                </div>
            </div>

            <div id="admin-post-tools" class="admin-panel hidden">
                <div class="color-group">
                    <span style="font-size:13px; font-weight:bold; color:var(--text-sub);">管理员色系：</span>
                    <div class="color-orb selected" style="background:#0984e3" onclick="selectColor('blue', this)"></div>
                    <div class="color-orb" style="background:#2ecc71" onclick="selectColor('green', this)"></div>
                    <div class="color-orb" style="background:#e74c3c" onclick="selectColor('red', this)"></div>
                    <div class="color-orb" style="background:#f1c40f" onclick="selectColor('gold', this)"></div>

                    <input type="checkbox" id="check-pin" style="width:18px; height:18px; margin-right:10px;">
                    <label for="check-pin" style="font-weight:bold; color:var(--admin-gold);">设为红头置顶公告</label>
                </div>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid #f8f9fa; padding-top:15px;">
                <div style="display:flex; align-items:center; cursor:pointer;" onclick="document.getElementById('file-post-img').click()">
                    <span style="font-size:26px;">🖼️</span>
                    <span style="margin-left:8px; font-weight:600; color:var(--text-sub); font-size:14px;">发照片</span>
                </div>
                <input type="file" id="file-post-img" hidden accept="image/*" onchange="processMedia(this, 'POST')">
                <button class="btn-confirm" onclick="submitToWall()">发布动态</button>
            </div>
        </div>

        <div id="wall-stream"></div>
    </div>

    <div id="view-messages" class="container">
        <h2 style="padding:0 10px; margin-bottom:20px;">💌 三高悄悄话</h2>
        <div id="session-list"></div>
    </div>

    <div id="view-profile" class="container">
        <div class="card" style="text-align:center; padding:50px 20px;">
            <img id="profile-head" style="width:120px; height:120px; border-radius:50%; border:5px solid #fff; box-shadow:0 10px 25px rgba(0,0,0,0.1);">
            <h2 id="profile-name" style="margin:15px 0 5px 0; font-size:24px;">...</h2>
            <div id="profile-badge"></div>

            <div style="margin-top:50px; display:grid; gap:15px;">
                <button id="btn-admin-mgr" class="btn-confirm hidden" style="background:#2d3436; height:55px; border-radius:20px;" onclick="openAdminManager()">
                    ⚙️ 管理员控制台 (全校成员管控)
                </button>
                <button class="btn-confirm" style="background:var(--text-sub); height:55px; border-radius:20px;" onclick="userLogout()">退出系统</button>
            </div>
        </div>

        <div id="admin-mgr-box" class="card hidden">
            <h3 style="margin-top:0; color:var(--danger-red); border-bottom:1px solid #eee; padding-bottom:10px;">全校成员名单</h3>
            <div id="all-user-list"></div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="switchView('wall')">
            <i>🏛️</i><span>广场</span>
        </div>
        <div class="tab-item" onclick="switchView('messages')">
            <i>📧</i><span>私信</span>
            <div id="badge-global" class="red-dot-signal hidden">0</div>
        </div>
        <div class="tab-item" onclick="switchView('profile')">
            <i>👤</i><span>我的</span>
        </div>
    </div>
</div>

<div id="msg-overlay" class="hidden" style="position:fixed; top:0; left:0; right:0; bottom:0; background:#f4f7f6; z-index:10001; display:flex; flex-direction:column;">
    <div style="background:#fff; padding:20px; display:flex; align-items:center; border-bottom:1px solid #eee; padding-top:calc(env(safe-area-inset-top) + 15px);">
        <div onclick="closeMsgOverlay()" style="font-size:22px; cursor:pointer; width:40px;">✕</div>
        <b id="msg-target-name" style="flex:1; text-align:center; font-size:18px;">正在对话...</b>
        <div style="width:40px;"></div>
    </div>
    <div id="msg-stream" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px;"></div>
    <div style="padding:15px; background:#fff; border-top:1px solid #eee; display:flex; gap:10px; padding-bottom:calc(env(safe-area-inset-bottom) + 10px);">
        <input id="in-msg" class="wall-input" style="margin:0; border-radius:30px; height:45px;" placeholder="说点什么...">
        <button class="btn-confirm" style="border-radius:30px;" onclick="sendPrivateMsg()">发送</button>
    </div>
</div>

<script>
    /* ================================================================
       逻辑控制器 - 灵宝三高管理员旗舰版 (在线状态 + 评论通知专区版)
       ================================================================
    */

    const API_URL = "https://ljopokentjagtxwdlzma.supabase.co";
    const API_KEY = "sb_publishable_OgGGB2YH9O8rv0Vg3K8jEA_rbxA7ZHk";
    const sango = supabase.createClient(API_URL, API_KEY);

    let me = null;
    let cachedB64 = "";
    let curPartner = null;
    let curColor = "blue";
    let presenceTimer = null;

    const ADMIN_USER = "何梓晨";
    const ADMIN_PASS = "hzc123456";
    const PRESENCE_ONLINE_MS = 60 * 1000;
    const PRESENCE_RECENT_MS = 5 * 60 * 1000;

    window.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('SANGO_USER_V27');
        if (saved) {
            me = JSON.parse(saved);
            launchApp();
        }
    });

    document.addEventListener('visibilitychange', () => {
        if (me && !document.hidden) syncPresenceHeartbeat();
    });

    function decodeMaybeEncoded(value = '') {
        try { return decodeURIComponent(value); } catch { return value; }
    }

    function stripAdminColorTag(text = '') {
        return String(text).replace(/^\[color:\w+\]/, '');
    }

    function shortText(text = '', limit = 26) {
        const val = stripAdminColorTag(String(text)).replace(/\s+/g, ' ').trim();
        return val.length > limit ? val.slice(0, limit) + '…' : (val || '图片动态');
    }

    function getSeenCommentKey() {
        return `SANGO_COMMENT_NOTICE_READ_${me?.name || 'guest'}`;
    }

    function getSeenCommentIds() {
        try {
            const val = JSON.parse(localStorage.getItem(getSeenCommentKey()) || '[]');
            return Array.isArray(val) ? val : [];
        } catch {
            return [];
        }
    }

    function markCommentNoticesRead(ids = []) {
        const merged = [...new Set([...getSeenCommentIds(), ...ids.map(Number).filter(Boolean)])].slice(-500);
        localStorage.setItem(getSeenCommentKey(), JSON.stringify(merged));
    }

    function getPresenceState(lastSeen) {
        if (!lastSeen) return { cls: 'offline', text: '离线' };
        const diff = Date.now() - new Date(lastSeen).getTime();
        if (Number.isNaN(diff)) return { cls: 'offline', text: '离线' };
        if (diff <= PRESENCE_ONLINE_MS) return { cls: 'online', text: '在线' };
        if (diff <= PRESENCE_RECENT_MS) return { cls: 'recent', text: '5分钟内在线' };
        return { cls: 'offline', text: '离线' };
    }

    async function syncPresenceHeartbeat() {
        if (!me) return;
        await sango.from('profiles').upsert([
            { username: me.name, avatar: me.avatar, last_login: new Date().toISOString() }
        ]);
    }

    function startPresenceHeartbeat() {
        clearInterval(presenceTimer);
        syncPresenceHeartbeat();
        presenceTimer = setInterval(syncPresenceHeartbeat, 45000);
    }

    async function handleLogin() {
        const name = document.getElementById('in-nickname').value.trim();
        const pass = document.getElementById('in-admin-pw').value.trim();

        if (!name) return alert('校友，请输入昵称！');
        if (name === ADMIN_USER && pass !== ADMIN_PASS) return alert('管理员密令核验失败！');

        const { data: profile } = await sango.from('profiles').select('*').eq('username', name).single();
        if (profile && profile.is_banned) return alert('该校友已被管理员封禁，无法进入！');

        me = {
            name,
            avatar: document.getElementById('img-avatar-pre').src || `https://api.dicebear.com/7.x/identicon/svg?seed=${name}`,
            isAdmin: (name === ADMIN_USER)
        };

        await sango.from('profiles').upsert([
            { username: name, avatar: me.avatar, last_login: new Date().toISOString() }
        ]);
        localStorage.setItem('SANGO_USER_V27', JSON.stringify(me));
        launchApp();
    }

    function launchApp() {
        document.getElementById('page-login').style.display = 'none';
        document.getElementById('app-body').classList.remove('hidden');

        document.getElementById('profile-name').innerText = me.name;
        document.getElementById('my-wall-head').src = me.avatar;
        document.getElementById('profile-head').src = me.avatar;

        if (me.isAdmin) {
            document.getElementById('admin-post-tools').classList.remove('hidden');
            document.getElementById('btn-admin-mgr').classList.remove('hidden');
            document.getElementById('profile-badge').innerHTML = '<span class="notice-label">官方管理员</span>';
        }

        startPresenceHeartbeat();
        renderWall();
        syncData();
        updateGlobalBadge();
    }

    function switchView(viewId, clickedEl = null) {
        document.querySelectorAll('.container').forEach(c => {
            c.classList.remove('active');
            c.style.display = 'none';
        });
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));

        const targetView = document.getElementById('view-' + viewId);
        if (!targetView) return;
        targetView.classList.add('active');
        targetView.style.display = 'block';

        const tabs = document.querySelectorAll('.tab-item');
        const tabMap = { wall: 0, messages: 1, profile: 2 };
        const targetTab = clickedEl || tabs[tabMap[viewId]];
        if (targetTab) targetTab.classList.add('active');

        if (viewId === 'messages') renderSessions();
        if (viewId === 'wall') renderWall();
    }

    async function renderWall() {
        const [postsRes, cmtsRes] = await Promise.all([
            sango.from('posts').select('*').order('is_notice', { ascending: false }).order('id', { ascending: false }),
            sango.from('comments').select('*').order('id', { ascending: true })
        ]);
        const posts = postsRes.data || [];
        const cmts = cmtsRes.data || [];
        const likes = JSON.parse(localStorage.getItem('SANGO_LIKES') || '[]');

        let html = '';
        posts.forEach(p => {
            const pCmts = cmts.filter(c => c.post_id === p.id);
            const liked = likes.includes(p.id);

            let bodyText = p.content || '';
            let cClass = '';
            if (p.username === ADMIN_USER && bodyText.startsWith('[color:')) {
                const match = bodyText.match(/\[color:(\w+)\](.*)/s);
                if (match) {
                    cClass = 't-' + match[1];
                    bodyText = match[2];
                }
            }

            html += `
                <div class="card ${p.is_notice ? 'pin-notice' : ''}" id="post-card-${p.id}">
                    <div style="display:flex; align-items:center; margin-bottom:12px;">
                        ${p.is_notice ? '<span class="notice-label">三高置顶</span>' : ''}
                        <img src="${p.avatar || 'https://api.dicebear.com/7.x/identicon/svg?seed=' + p.username}" style="width:42px; height:42px; border-radius:50%; margin-right:12px;">
                        <div style="flex:1">
                            <b class="${cClass}">${p.username}</b>
                            ${p.username === ADMIN_USER ? '<span class="admin-tag">管理员</span>' : ''}
                        </div>
                        ${(p.username === me.name || me.isAdmin) ? `<span class="admin-del-btn" onclick="killPost(${p.id})">删除动态</span>` : ''}
                    </div>

                    <div style="font-size:17px; white-space:pre-wrap; line-height:1.7;" class="${cClass}">${bodyText}</div>
                    ${p.post_img ? `<img src="${p.post_img}" style="width:100%; border-radius:15px; margin-top:12px;">` : ''}

                    <div style="display:flex; gap:18px; margin-top:18px; color:var(--text-sub); font-size:14px; font-weight:bold; flex-wrap:wrap;">
                        <span onclick="doLike(${p.id}, ${p.likes || 0})" style="cursor:pointer; ${liked ? 'color:var(--danger-red)' : ''}">❤️ ${p.likes || 0}</span>
                        <span onclick="document.getElementById('in-cmt-${p.id}').focus()" style="cursor:pointer;">💬 ${pCmts.length}</span>
                        <span onclick="openChat('${encodeURIComponent(p.username)}')" style="cursor:pointer; color:var(--primary);">📧 悄悄话</span>
                        ${me.isAdmin ? `<span style="margin-left:auto; color:var(--admin-gold); cursor:pointer;" onclick="pinPost(${p.id}, ${p.is_notice})">${p.is_notice ? '取消置顶' : '📌置顶'}</span>` : ''}
                    </div>

                    <div style="margin-top:12px; padding-top:12px; border-top:1px solid #f9f9f9;">
                        ${pCmts.map(c => `
                            <div id="cmt-row-${c.id}" style="display:flex; justify-content:space-between; gap:10px; margin-bottom:8px; font-size:14px; align-items:flex-start;">
                                <span style="flex:1; min-width:0; word-break:break-word;"><b>${c.username}</b>: ${c.content}</span>
                                <span style="display:flex; gap:10px; align-items:center; white-space:nowrap; font-size:12px;">
                                    <span class="comment-reply-link" onclick="replyToComment(${p.id}, ${c.id}, '${encodeURIComponent(c.username)}')">回复</span>
                                    ${(c.username === me.name || me.isAdmin) ? `<span style="color:var(--danger-red); cursor:pointer;" onclick="killCmt(${c.id})">×</span>` : ''}
                                </span>
                            </div>
                        `).join('')}
                        <div style="display:flex; gap:8px; margin-top:8px;">
                            <input id="in-cmt-${p.id}" class="wall-input" style="margin:0; padding:8px; font-size:12px; height:35px;" placeholder="我也来说两句...">
                            <button class="btn-confirm" style="padding:0 12px; font-size:11px; height:35px;" onclick="addCmt(${p.id})">发送</button>
                        </div>
                    </div>
                </div>`;
        });

        document.getElementById('wall-stream').innerHTML = html || '<div style="text-align:center; padding:80px 0; color:#bdc3c7;">墙上空空如也...</div>';
    }

    async function submitToWall() {
        const { data: profile } = await sango.from('profiles').select('is_banned').eq('username', me.name).single();
        if (profile?.is_banned) return alert('禁言账户，无权发声！');

        const text = document.getElementById('post-text').value.trim();
        const pinned = document.getElementById('check-pin').checked && me.isAdmin;
        if (!text && !cachedB64) return;

        const body = me.isAdmin ? `[color:${curColor}]${text}` : text;
        await sango.from('posts').insert([
            { username: me.name, content: body, avatar: me.avatar, post_img: cachedB64, is_notice: pinned }
        ]);

        document.getElementById('post-text').value = '';
        document.getElementById('check-pin').checked = false;
        clearMedia();
        renderWall();
    }

    async function fetchCommentNotifications() {
        if (!me) return [];

        const [postsRes, commentsRes] = await Promise.all([
            sango.from('posts').select('id,username,content').order('id', { ascending: false }),
            sango.from('comments').select('id,post_id,username,content').order('id', { ascending: true })
        ]);
        const posts = postsRes.data || [];
        const comments = commentsRes.data || [];
        const postMap = Object.fromEntries(posts.map(p => [p.id, p]));
        const myPostIds = new Set(posts.filter(p => p.username === me.name).map(p => p.id));
        const myCommentIdsByPost = {};

        comments.forEach(c => {
            if (c.username === me.name) {
                if (!myCommentIdsByPost[c.post_id]) myCommentIdsByPost[c.post_id] = [];
                myCommentIdsByPost[c.post_id].push(c.id);
            }
        });

        return comments
            .filter(c => c.username !== me.name)
            .map(c => {
                const post = postMap[c.post_id];
                if (!post) return null;
                const ownPost = myPostIds.has(c.post_id);
                const hasJoinedBefore = (myCommentIdsByPost[c.post_id] || []).some(id => id < c.id);
                if (!ownPost && !hasJoinedBefore) return null;

                return {
                    id: c.id,
                    postId: c.post_id,
                    from: c.username,
                    reason: ownPost ? '回复了你的帖子' : '回复了你参与的评论区',
                    commentPreview: c.content || '有人给你发来了新评论',
                    postPreview: shortText(post.content || '', 28)
                };
            })
            .filter(Boolean)
            .sort((a, b) => b.id - a.id);
    }

    function renderCommentNoticeCard(notifications) {
        const seenSet = new Set(getSeenCommentIds());
        const unreadCount = notifications.filter(n => !seenSet.has(n.id)).length;
        const items = notifications.length
            ? notifications.slice(0, 8).map(n => `
                <div class="comment-notice-item ${seenSet.has(n.id) ? 'seen' : 'unread'}" onclick="jumpToReply(${n.postId}, ${n.id}, '${encodeURIComponent(n.from)}')">
                    <div class="comment-notice-top">
                        <b>${n.from}</b>
                        <span class="comment-notice-tag">${n.reason}</span>
                    </div>
                    <div class="comment-notice-text">“${n.commentPreview}”</div>
                    <div class="comment-notice-post">关联帖子：${n.postPreview}</div>
                </div>
            `).join('')
            : '<div class="comment-notice-empty">暂时还没有新的评论提醒，别人回复你的帖子或评论后，会优先显示在这里。</div>';

        return `
            <div class="card pin-notice comment-zone-card">
                <div class="comment-zone-header">
                    <div class="comment-zone-title">
                        <span class="notice-label" style="margin-right:0;">置顶</span>
                        <span>评论通知专区</span>
                    </div>
                    <span class="comment-zone-count">${unreadCount} 条未读</span>
                </div>
                <div class="comment-zone-desc">当别人回复你的帖子，或者在你参与过的评论区继续留言时，提醒会固定出现在这里。点任意一条，就会直接跳回对应帖子下方，方便你继续回复。</div>
                <div class="comment-notice-list">${items}</div>
            </div>
        `;
    }

    async function updateGlobalBadge() {
        if (!me) return;
        const [msgRes, commentNotifications] = await Promise.all([
            sango.from('messages').select('id').eq('receiver', me.name).eq('is_read', false),
            fetchCommentNotifications()
        ]);
        const unreadMsgs = (msgRes.data || []).length;
        const seenSet = new Set(getSeenCommentIds());
        const unreadComments = (commentNotifications || []).filter(n => !seenSet.has(n.id)).length;
        const total = unreadMsgs + unreadComments;
        const badge = document.getElementById('badge-global');

        if (total > 0) {
            badge.innerText = total;
            badge.classList.remove('hidden');
        } else {
            badge.classList.add('hidden');
        }
    }

    async function renderSessions() {
        const [msgsRes, unreadsRes, commentNotifications] = await Promise.all([
            sango.from('messages').select('*').or(`sender.eq."${me.name}",receiver.eq."${me.name}"`).order('id', { ascending: false }),
            sango.from('messages').select('sender').eq('receiver', me.name).eq('is_read', false),
            fetchCommentNotifications()
        ]);
        const msgs = msgsRes.data || [];
        const unreads = unreadsRes.data || [];
        const partners = [...new Set(msgs.map(m => m.sender === me.name ? m.receiver : m.sender))];

        const noticeCard = renderCommentNoticeCard(commentNotifications || []);
        const sessionHtml = partners.map(user => {
            const last = msgs.find(m => m.sender === user || m.receiver === user) || { content: '点击开始聊天' };
            const count = unreads.filter(u => u.sender === user).length;
            return `
                <div class="card" onclick="openChat('${encodeURIComponent(user)}')" style="display:flex; align-items:center; cursor:pointer;">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=${user}" style="width:50px; height:50px; border-radius:50%; margin-right:15px;">
                    <div style="flex:1; min-width:0;">
                        <div style="display:flex; justify-content:space-between; gap:10px; align-items:center;">
                            <b style="min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${user}</b>
                            ${count > 0 ? `<div class="msg-badge-pulse">${count}</div>` : ''}
                        </div>
                        <div style="font-size:13px; color:var(--text-sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${last.content}</div>
                    </div>
                </div>`;
        }).join('');

        document.getElementById('session-list').innerHTML = noticeCard + (sessionHtml || '<div style="text-align:center; padding:50px 0 100px; color:#bdc3c7;">暂时还没有私信对话</div>');
    }

    async function renderAdminManagerList() {
        const { data } = await sango.from('profiles').select('*').order('username', { ascending: true });
        document.getElementById('all-user-list').innerHTML = (data || []).map(u => {
            const status = getPresenceState(u.last_login);
            return `
                <div class="member-row">
                    <span class="presence-dot ${status.cls}" title="${status.text}"></span>
                    <img src="${u.avatar || ('https://api.dicebear.com/7.x/identicon/svg?seed=' + u.username)}" style="width:35px; height:35px; border-radius:50%; margin-right:15px;">
                    <div class="member-main">
                        <b style="display:block;">${u.username}</b>
                        <div class="presence-text">${status.text}</div>
                    </div>
                    <button class="ban-btn ${u.is_banned ? 'active' : ''}" onclick="toggleBanStatus('${encodeURIComponent(u.username)}', ${u.is_banned ? 'true' : 'false'})">
                        ${u.is_banned ? '解除封禁' : '执行禁言'}
                    </button>
                </div>
            `;
        }).join('');
    }

    async function openAdminManager() {
        const box = document.getElementById('admin-mgr-box');
        box.classList.toggle('hidden');
        if (!box.classList.contains('hidden')) {
            renderAdminManagerList();
        }
    }

    async function toggleBanStatus(usernameEncoded, current) {
        const username = decodeMaybeEncoded(usernameEncoded);
        if (username === ADMIN_USER) return alert('管理员不可被禁言');
        if (confirm(`确定要改变 [${username}] 的状态吗？`)) {
            await sango.from('profiles').update({ is_banned: !current }).eq('username', username);
            renderAdminManagerList();
        }
    }

    async function doLike(pid, n) {
        let likes = JSON.parse(localStorage.getItem('SANGO_LIKES') || '[]');
        const idx = likes.indexOf(pid);
        const count = (idx === -1) ? (n + 1) : Math.max(0, n - 1);
        (idx === -1) ? likes.push(pid) : likes.splice(idx, 1);
        localStorage.setItem('SANGO_LIKES', JSON.stringify(likes));
        await sango.from('posts').update({ likes: count }).eq('id', pid);
        renderWall();
    }

    async function addCmt(pid) {
        const val = document.getElementById('in-cmt-' + pid).value.trim();
        if (!val) return;
        await sango.from('comments').insert([{ post_id: pid, username: me.name, content: val }]);
        document.getElementById('in-cmt-' + pid).value = '';
        renderWall();
        updateGlobalBadge();
    }

    async function killPost(id) {
        if (confirm('删除这条动态？')) {
            await sango.from('posts').delete().eq('id', id);
            renderWall();
            updateGlobalBadge();
        }
    }

    async function killCmt(id) {
        if (confirm('删除这条评论？')) {
            await sango.from('comments').delete().eq('id', id);
            renderWall();
            updateGlobalBadge();
            if (document.getElementById('view-messages').classList.contains('active')) renderSessions();
        }
    }

    async function pinPost(id, current) {
        await sango.from('posts').update({ is_notice: !current }).eq('id', id);
        renderWall();
    }

    function syncData() {
        sango.channel('all-changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, async () => {
                updateGlobalBadge();
                if (curPartner) loadMsgHistory();
                if (document.getElementById('view-messages').classList.contains('active')) renderSessions();
            })
            .on('postgres_changes', { event: '*', schema: 'public', table: 'comments' }, async () => {
                renderWall();
                updateGlobalBadge();
                if (document.getElementById('view-messages').classList.contains('active')) renderSessions();
            })
            .on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, async () => {
                renderWall();
                updateGlobalBadge();
                if (document.getElementById('view-messages').classList.contains('active')) renderSessions();
            })
            .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, async () => {
                if (me?.isAdmin && !document.getElementById('admin-mgr-box').classList.contains('hidden')) {
                    renderAdminManagerList();
                }
            })
            .subscribe();
    }

    function processMedia(input, mode) {
        if (!input.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const cvs = document.createElement('canvas');
                const max = mode === 'AVATAR' ? 150 : 800;
                cvs.width = max;
                cvs.height = img.height * (max / img.width);
                cvs.getContext('2d').drawImage(img, 0, 0, cvs.width, cvs.height);
                const b64 = cvs.toDataURL('image/jpeg', 0.8);
                if (mode === 'AVATAR') {
                    document.getElementById('img-avatar-pre').src = b64;
                    document.getElementById('img-avatar-pre').classList.remove('hidden');
                    document.getElementById('txt-plus').classList.add('hidden');
                } else {
                    cachedB64 = b64;
                    document.getElementById('img-post-pre').src = b64;
                    document.getElementById('post-img-box').classList.remove('hidden');
                }
            };
        };
        reader.readAsDataURL(input.files[0]);
    }

    async function openChat(partnerEncoded) {
        const partner = decodeMaybeEncoded(partnerEncoded);
        if (partner === me.name) return;
        curPartner = partner;
        document.getElementById('msg-target-name').innerText = '与 ' + partner + ' 对话中';
        document.getElementById('msg-overlay').classList.remove('hidden');
        await sango.from('messages').update({ is_read: true }).eq('receiver', me.name).eq('sender', partner);
        updateGlobalBadge();
        loadMsgHistory();
    }

    async function loadMsgHistory() {
        if (!curPartner) return;
        const { data } = await sango.from('messages')
            .select('*')
            .or(`and(sender.eq."${me.name}",receiver.eq."${curPartner}"),and(sender.eq."${curPartner}",receiver.eq."${me.name}")`)
            .order('id', { ascending: true });

        document.getElementById('msg-stream').innerHTML = (data || []).map(m => `
            <div style="max-width:80%; padding:12px 16px; border-radius:18px; font-size:15px; ${m.sender === me.name ? 'align-self:flex-end; background:var(--primary); color:#fff;' : 'align-self:flex-start; background:#fff; color:var(--text-main);'}">
                ${m.content}
            </div>
        `).join('');
        const stream = document.getElementById('msg-stream');
        stream.scrollTop = stream.scrollHeight;
    }

    async function sendPrivateMsg() {
        const val = document.getElementById('in-msg').value.trim();
        if (!val || !curPartner) return;
        await sango.from('messages').insert([{ sender: me.name, receiver: curPartner, content: val, is_read: false }]);
        document.getElementById('in-msg').value = '';
    }

    function replyToComment(postId, commentId, usernameEncoded) {
        const username = decodeMaybeEncoded(usernameEncoded);
        const input = document.getElementById('in-cmt-' + postId);
        const targetComment = document.getElementById('cmt-row-' + commentId);
        if (targetComment) {
            targetComment.classList.add('comment-anchor-flash');
            setTimeout(() => targetComment.classList.remove('comment-anchor-flash'), 1600);
        }
        if (input) {
            if (!input.value.trim()) input.value = `回复 @${username}：`;
            input.focus();
            input.setSelectionRange(input.value.length, input.value.length);
        }
    }

    function jumpToReply(postId, commentId, usernameEncoded) {
        markCommentNoticesRead([commentId]);
        switchView('wall');
        renderWall().then(() => {
            setTimeout(() => {
                const postCard = document.getElementById(`post-card-${postId}`);
                const commentRow = document.getElementById(`cmt-row-${commentId}`);
                if (postCard) {
                    postCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    postCard.classList.add('comment-anchor-flash');
                    setTimeout(() => postCard.classList.remove('comment-anchor-flash'), 1600);
                }
                if (commentRow) {
                    commentRow.classList.add('comment-anchor-flash');
                    setTimeout(() => commentRow.classList.remove('comment-anchor-flash'), 1600);
                }
                replyToComment(postId, commentId, usernameEncoded);
            }, 160);
        });
        updateGlobalBadge();
        renderSessions();
    }

    function selectColor(c, el) {
        curColor = c;
        document.querySelectorAll('.color-orb').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
    }

    function clearMedia() {
        cachedB64 = '';
        document.getElementById('post-img-box').classList.add('hidden');
    }

    function closeMsgOverlay() {
        document.getElementById('msg-overlay').classList.add('hidden');
        curPartner = null;
    }

    function userLogout() {
        if (confirm('确定退出？')) {
            clearInterval(presenceTimer);
            localStorage.clear();
            location.reload();
        }
    }
</script>
