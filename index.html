<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>灵宝市第三高中表白墙 | 官方至尊旗舰版</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        /* ================================================================
           1. 全局变量与核心视觉定义 (不准瘦身，每一行都是为了质感)
           ================================================================
        */
        :root {
            --primary: #0984e3;           /* 三高蓝 */
            --primary-light: #74b9ff;
            --bg: #f4f7f6;               /* 浅灰色背景 */
            --white: #ffffff;
            --card-radius: 24px;         /* 圆润卡片 */
            --admin-gold: #f1c40f;       /* 管理员金 */
            --danger: #e74c3c;           /* 警告红 */
            --success: #2ecc71;          /* 成功绿 */
            --text-dark: #2d3436;        /* 深色主文字 */
            --text-gray: #636e72;        /* 辅助文字 */
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* ================================================================
           2. 基础复位与响应式处理
           ================================================================
        */
        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            line-height: 1.6;
            padding-bottom: 100px; /* 底部导航留白 */
            overflow-x: hidden;
            user-select: none; /* 防止三高校友长按误触 */
        }

        /* ================================================================
           3. 底部导航栏设计 (Tab Bar)
           ================================================================
        */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 75px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(0,0,0,0.05);
            z-index: 9999;
            padding-bottom: env(safe-area-inset-bottom);
            box-shadow: 0 -5px 20px rgba(0,0,0,0.03);
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: #bdc3c7;
            text-decoration: none;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }

        .tab-item.active {
            color: var(--primary);
            font-weight: 800;
            transform: translateY(-2px);
        }

        .tab-item i {
            font-size: 24px;
            margin-bottom: 4px;
        }

        /* ================================================================
           4. 核心功能：信号气泡 (你画圈的位置)
           ================================================================
        */
        /* 导航栏上的红点 */
        .badge-nav {
            position: absolute;
            top: 5px;
            right: 25%;
            background: var(--danger);
            color: white;
            font-size: 10px;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            font-weight: bold;
        }

        /* 私信列表里的信号气泡 - Heartbeat 2.0 动画 */
        .msg-status-dot {
            background-color: var(--danger);
            color: #fff;
            font-size: 12px;
            font-weight: 900;
            min-width: 24px;
            height: 24px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #fff;
            box-shadow: 0 0 10px rgba(231, 76, 60, 0.4);
            animation: pulse-ring 1.5s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        /* ================================================================
           5. 卡片与 UI 布局组件
           ================================================================
        */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: var(--white);
            border-radius: var(--card-radius);
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.02);
            transition: var(--transition);
        }

        .card:active {
            transform: scale(0.99);
        }

        /* 置顶样式 */
        .notice-card {
            background: linear-gradient(145deg, #ffffff, #fffcf0);
            border: 2px solid var(--admin-gold);
            box-shadow: 0 15px 35px rgba(241, 196, 15, 0.15);
        }

        .badge-notice {
            background: var(--admin-gold);
            color: #fff;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 6px;
            font-weight: 900;
            margin-right: 10px;
        }

        /* ================================================================
           6. 上帝权限与互动功能样式 (重点)
           ================================================================
        */
        .admin-action-tag {
            font-size: 10px;
            border: 1.5px solid var(--primary);
            color: var(--primary);
            padding: 1px 6px;
            border-radius: 4px;
            margin-left: 8px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .delete-trigger {
            color: var(--danger);
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 10px;
            background: rgba(231, 76, 60, 0.08);
            margin-left: auto;
            transition: all 0.2s;
        }

        .delete-trigger:hover {
            background: var(--danger);
            color: #fff;
        }

        .god-mode-panel {
            border-top: 2px dashed #eee;
            margin-top: 20px;
            padding-top: 20px;
        }

        .ban-status-row {
            display: flex;
            align-items: center;
            background: #f9f9f9;
            padding: 12px 18px;
            border-radius: 15px;
            margin-bottom: 10px;
        }

        .ban-toggle-btn {
            background: var(--text-dark);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .ban-active {
            background: var(--danger) !important;
        }

        /* ================================================================
           7. 输入、按钮与表单
           ================================================================
        */
        .input-box {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            border: 2px solid #edf2f7;
            background: #f8fafc;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            color: var(--text-dark);
        }

        .input-box:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 5px rgba(9, 132, 227, 0.1);
        }

        .btn-main {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 14px 30px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-main:active {
            transform: translateY(2px);
        }

        /* 配色选择器 */
        .color-selector {
            display: flex;
            gap: 15px;
            margin: 15px 0;
        }

        .color-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .color-dot.active {
            transform: scale(1.25);
            border-color: #2d3436;
        }

        /* 文字颜色映射 */
        .c-blue { color: #0984e3 !important; }
        .c-green { color: #2ecc71 !important; }
        .c-red { color: #e74c3c !important; }
        .c-gold { color: #f1c40f !important; }
        .c-black { color: #2d3436 !important; }

        .hidden { display: none !important; }

        /* 动画库 */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-up {
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
    </style>
</head>
<body>

<div id="auth-screen" class="container" style="margin-top: 60px;">
    <div class="card animate-up" style="text-align: center; padding: 50px 30px;">
        <div id="avatar-trigger" style="width: 110px; height: 110px; border-radius: 50%; background: #f0f3f5; margin: 0 auto 25px; border: 3px dashed #cbd5e0; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer;" onclick="document.getElementById('input-avatar').click()">
            <span id="avatar-placeholder" style="font-size: 40px; color: #a0aec0;">+</span>
            <img id="avatar-preview" class="hidden" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <input type="file" id="input-avatar" hidden accept="image/*" onchange="handleImageProcess(this, 'USER_HEAD')">

        <h1 style="margin:0; font-size:28px; letter-spacing:1px; color:var(--primary);">灵宝市第三高中</h1>
        <p style="color:var(--text-gray); font-size:15px; margin-top:8px; font-weight: 500;">官方唯一实名/匿名表白墙系统</p>

        <div style="margin-top:40px;">
            <input id="user-nickname" class="input-box" maxlength="12" placeholder="输入校友专属昵称...">
            <input id="admin-pass" class="input-box" type="password" style="margin-top:15px;" placeholder="若是上帝（管理员）请输入密码">
            
            <button class="btn-main" style="width:100%; height:60px; margin-top:25px; font-size:18px;" onclick="initUserLogin()">
                进入三高秘密基地
            </button>
        </div>
        
        <div style="margin-top:25px; font-size:12px; color:#a0aec0;">
            <p>登录即代表您同意《灵宝三高校园文明网络公约》</p>
        </div>
    </div>
</div>

<div id="main-app" class="hidden">
    
    <div id="view-hub" class="container view active">
        <div class="card animate-up">
            <div style="display:flex; align-items:flex-start;">
                <img id="post-user-avatar" style="width:45px; height:45px; border-radius:50%; margin-right:15px; background:#eee;">
                <textarea id="post-content-area" class="input-box" style="border:none; background:transparent; padding:0; height:120px; resize:none; font-size:18px;" placeholder="这一刻，你想对三高的谁大声表白？"></textarea>
            </div>

            <div id="post-img-preview-box" class="hidden" style="margin:15px 0;">
                <div style="position:relative; display:inline-block;">
                    <img id="post-img-display" style="width:160px; border-radius:15px; box-shadow:0 8px 20px rgba(0,0,0,0.1);">
                    <span style="position:absolute; top:-10px; right:-10px; background:#2d3436; color:#fff; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="clearPostImage()">×</span>
                </div>
            </div>

            <div id="admin-secret-zone" class="god-mode-panel hidden">
                <div class="color-selector">
                    <span style="font-size:14px; font-weight:bold; color:var(--text-gray);">主理人专属色：</span>
                    <div class="color-dot active" style="background:#0984e3" onclick="setPostColor('blue', this)"></div>
                    <div class="color-dot" style="background:#2ecc71" onclick="setPostColor('green', this)"></div>
                    <div class="color-dot" style="background:#e74c3c" onclick="setPostColor('red', this)"></div>
                    <div class="color-dot" style="background:#f1c40f" onclick="setPostColor('gold', this)"></div>
                    <div class="color-dot" style="background:#2d3436" onclick="setPostColor('black', this)"></div>
                </div>
                <div style="display:flex; align-items:center; margin-bottom:15px;">
                    <input type="checkbox" id="is-notice-check" style="width:18px; height:18px; margin-right:10px;">
                    <label for="is-notice-check" style="font-weight:bold; color:var(--admin-gold); cursor:pointer;">设为三高红头置顶公告</label>
                </div>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid #f1f4f6; padding-top:20px;">
                <div style="display:flex; align-items:center; cursor:pointer;" onclick="document.getElementById('input-post-img').click()">
                    <span style="font-size:28px;">🖼️</span>
                    <span style="margin-left:8px; font-weight:600; color:var(--text-gray); font-size:14px;">上传照片</span>
                </div>
                <input type="file" id="input-post-img" hidden accept="image/*" onchange="handleImageProcess(this, 'POST_IMG')">
                <button class="btn-main" id="publish-btn" onclick="executePublish()">立即上墙</button>
            </div>
        </div>

        <div id="wall-feed"></div>
    </div>

    <div id="view-chat" class="container view">
        <div style="display:flex; align-items:center; margin-bottom:25px; padding:0 10px;">
            <h2 style="margin:0; font-size:24px;">💬 校园悄悄话</h2>
        </div>
        <div id="chat-list-container"></div>
    </div>

    <div id="view-me" class="container view">
        <div class="card animate-up" style="text-align:center; padding:60px 20px;">
            <div style="position:relative; display:inline-block;">
                <img id="my-profile-head" style="width:130px; height:130px; border-radius:50%; border:6px solid #fff; box-shadow:0 15px 35px rgba(0,0,0,0.1);">
            </div>
            <h2 id="my-profile-name" style="margin:15px 0 5px 0; font-size:26px;">...</h2>
            <div id="my-profile-tag"></div>

            <div style="margin-top:50px; display:grid; gap:15px;">
                <button id="god-panel-trigger" class="btn-main hidden" style="background:#2d3436; border-radius:20px;" onclick="toggleGodManager()">
                    🛡️ 开启上帝管理终端 (禁言/放逐)
                </button>
                <button class="btn-main" style="background:var(--text-gray); border-radius:20px;" onclick="handleAppLogout()">
                    🚪 离开表白墙
                </button>
            </div>
        </div>

        <div id="god-manager-box" class="card hidden">
            <div style="display:flex; align-items:center; margin-bottom:20px;">
                <div style="width:4px; height:20px; background:var(--danger); margin-right:10px; border-radius:2px;"></div>
                <h3 style="margin:0; color:var(--danger);">上帝指令：校友状态管控</h3>
            </div>
            <div id="god-user-list"></div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="switchView('hub')">
            <i>🏛️</i><span>广场</span>
        </div>
        <div class="tab-item" onclick="switchView('chat')">
            <i>💌</i><span>私信</span>
            <div id="global-unread-badge" class="badge-nav hidden">0</div>
        </div>
        <div class="tab-item" onclick="switchView('me')">
            <i>👤</i><span>我的</span>
        </div>
    </div>
</div>

<div id="chat-window-overlay" class="hidden" style="position:fixed; top:0; left:0; right:0; bottom:0; background:#f4f7f6; z-index:10000; display:flex; flex-direction:column;">
    <div style="background:#fff; padding:20px; display:flex; align-items:center; border-bottom:1px solid #eee; padding-top:calc(env(safe-area-inset-top) + 15px);">
        <div onclick="closeChatWindow()" style="width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:#f8f9fa; cursor:pointer; font-size:20px;">✕</div>
        <div style="margin-left:15px;">
            <b id="active-chat-name" style="font-size:18px;">正在连接...</b>
            <div style="font-size:11px; color:var(--success);">● 在线</div>
        </div>
    </div>
    <div id="chat-message-stream" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:15px;"></div>
    <div style="padding:15px; background:#fff; border-top:1px solid #eee; display:flex; gap:10px; padding-bottom:calc(env(safe-area-inset-bottom) + 15px);">
        <input id="chat-message-input" class="input-box" style="margin:0; border-radius:30px; height:50px;" placeholder="发送私密讯息...">
        <button class="btn-main" style="border-radius:30px; padding:0 25px;" onclick="sendChatMessage()">发送</button>
    </div>
</div>

<script>
    /* ================================================================
       逻辑控制器 - 灵宝三高至尊旗舰版 (不瘦身逻辑)
       ================================================================
    */

    // 1. 初始化 Supabase
    const SUPA_URL = "https://ljopokentjagtxwdlzma.supabase.co";
    const SUPA_KEY = "sb_publishable_OgGGB2YH9O8rv0Vg3K8jEA_rbxA7ZHk";
    const supabaseClient = supabase.createClient(SUPA_URL, SUPA_KEY);

    // 2. 核心状态存储
    let currentUser = null;
    let postImageCache = "";
    let chatPartner = null;
    let selectedColor = "blue";
    
    const MASTER_NAME = "何梓晨";
    const MASTER_KEY = "hzc123456";

    // 3. 页面加载监听
    window.addEventListener('DOMContentLoaded', async () => {
        const localData = localStorage.getItem('SANGO_WALL_V26_ULTRA');
        if (localData) {
            currentUser = JSON.parse(localData);
            launchApplication();
        }
    });

    // 4. 登录逻辑 (包含禁言判定)
    async function initUserLogin() {
        const nickname = document.getElementById('user-nickname').value.trim();
        const password = document.getElementById('admin-pass').value.trim();
        
        if (!nickname) return alert("三高校友，请先报上名来！");
        if (nickname === MASTER_NAME && password !== MASTER_KEY) return alert("上帝密码错误，身份核实失败！");

        // 从数据库查询是否被禁言
        const { data: profile, error } = await supabaseClient.from('profiles').select('*').eq('username', nickname).single();
        if (profile && profile.is_banned) {
            return alert("【禁言警告】由于多次违规，您的账号已被三高管理员永久封禁！");
        }

        currentUser = {
            name: nickname,
            avatar: document.getElementById('avatar-preview').src || `https://api.dicebear.com/7.x/identicon/svg?seed=${nickname}`,
            isAdmin: (nickname === MASTER_NAME)
        };

        // 写入/更新 数据库
        await supabaseClient.from('profiles').upsert([
            { username: nickname, avatar: currentUser.avatar, last_login: new Date() }
        ]);

        localStorage.setItem('SANGO_WALL_V26_ULTRA', JSON.stringify(currentUser));
        launchApplication();
    }

    // 5. 启动应用
    function launchApplication() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        
        document.getElementById('my-profile-name').innerText = currentUser.name;
        document.getElementById('post-user-avatar').src = currentUser.avatar;
        document.getElementById('my-profile-head').src = currentUser.avatar;

        if (currentUser.isAdmin) {
            document.getElementById('admin-secret-zone').classList.remove('hidden');
            document.getElementById('god-panel-trigger').classList.remove('hidden');
            document.getElementById('my-profile-tag').innerHTML = '<span class="badge-notice" style="background:var(--primary)">官方主理人</span>';
        }

        refreshWallFeed();
        startRealtimeEngine();
        checkGlobalUnread();
    }

    // 6. 核心功能：发帖 (包含颜色与禁言二次校验)
    async function executePublish() {
        // 禁言二次防护
        const { data: profile } = await supabaseClient.from('profiles').select('is_banned').eq('username', currentUser.name).single();
        if (profile?.is_banned) return alert("禁言中，无法操作！");

        const text = document.getElementById('post-content-area').value.trim();
        const isNotice = document.getElementById('is-notice-check').checked && currentUser.isAdmin;
        
        if (!text && !postImageCache) return alert("总得写点什么吧，哪怕一个字也行呀。");

        const finalBody = currentUser.isAdmin ? `[color:${selectedColor}]${text}` : text;

        const { error } = await supabaseClient.from('posts').insert([
            { 
                username: currentUser.name, 
                content: finalBody, 
                avatar: currentUser.avatar, 
                post_img: postImageCache, 
                is_notice: isNotice 
            }
        ]);

        if (!error) {
            document.getElementById('post-content-area').value = "";
            clearPostImage();
            refreshWallFeed();
        }
    }

    // 7. 渲染墙面动态 (带删除权限判定)
    async function refreshWallFeed() {
        const { data: posts } = await supabaseClient.from('posts').select('*').order('is_notice', {ascending:false}).order('id', {ascending:false});
        const { data: comments } = await supabaseClient.from('comments').select('*').order('id', {ascending:true});
        const likesMap = JSON.parse(localStorage.getItem('SANGO_LIKES') || "[]");

        let html = "";
        (posts || []).forEach(p => {
            const postCmts = (comments || []).filter(c => c.post_id === p.id);
            const isLiked = likesMap.includes(p.id);

            // 解析管理员颜色
            let displayBody = p.content, cClass = "";
            if (p.username === MASTER_NAME && p.content.startsWith('[color:')) {
                const match = p.content.match(/\[color:(\w+)\](.*)/s);
                if (match) { cClass = "c-" + match[1]; displayBody = match[2]; }
            }

            html += `
                <div class="card animate-up ${p.is_notice ? 'notice-card' : ''}">
                    <div style="display:flex; align-items:center; margin-bottom:15px;">
                        ${p.is_notice ? '<span class="badge-notice">三高红头文件</span>' : ''}
                        <img src="${p.avatar || 'https://api.dicebear.com/7.x/identicon/svg?seed='+p.username}" style="width:45px; height:45px; border-radius:50%; margin-right:12px;">
                        <div style="flex:1">
                            <b class="${cClass}">${p.username}</b>
                            ${p.username === MASTER_NAME ? '<span class="admin-action-tag">主理人</span>' : ''}
                        </div>
                        ${(p.username === currentUser.name || currentUser.isAdmin) ? `<div class="delete-trigger" onclick="deletePostAction(${p.id})">删除动态</div>` : ''}
                    </div>

                    <div style="font-size:17px; white-space:pre-wrap; line-height:1.8;" class="${cClass}">${displayBody}</div>
                    
                    ${p.post_img ? `<img src="${p.post_img}" style="width:100%; border-radius:18px; margin-top:15px; display:block;">` : ''}

                    <div style="display:flex; gap:20px; margin-top:20px; color:var(--text-gray); font-size:14px; font-weight:600;">
                        <span onclick="togglePostLike(${p.id}, ${p.likes})" style="cursor:pointer; ${isLiked ? 'color:var(--danger)' : ''}">❤️ ${p.likes || 0}</span>
                        <span onclick="document.getElementById('input-cmt-${p.id}').focus()" style="cursor:pointer;">💬 ${postCmts.length} 评论</span>
                        <span onclick="openPrivateChat('${p.username}')" style="cursor:pointer; color:var(--primary);">📧 悄悄话</span>
                        ${currentUser.isAdmin ? `<span onclick="togglePinStatus(${p.id}, ${p.is_notice})" style="margin-left:auto; color:var(--admin-gold); cursor:pointer;">${p.is_notice ? '📍取消' : '📌置顶'}</span>` : ''}
                    </div>

                    <div style="margin-top:15px; padding-top:15px; border-top:1px solid #f9f9f9;">
                        ${postCmts.map(c => `
                            <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:14px;">
                                <span><b>${c.username}</b>: ${c.content}</span>
                                ${(c.username === currentUser.name || currentUser.isAdmin) ? `<span style="color:var(--danger); cursor:pointer;" onclick="deleteCmtAction(${c.id})">×</span>` : ''}
                            </div>
                        `).join('')}
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <input id="input-cmt-${p.id}" class="input-box" style="margin:0; padding:10px; font-size:13px; height:38px;" placeholder="说点什么...">
                            <button class="btn-main" style="padding:0 15px; font-size:12px; height:38px;" onclick="submitComment(${p.id})">回复</button>
                        </div>
                    </div>
                </div>`;
        });
        document.getElementById('wall-feed').innerHTML = html || '<div style="text-align:center; padding:100px 0; color:#cbd5e0;">还没有人发帖，快来占领高地！</div>';
    }

    // 8. 🎯 信号气泡逻辑 (你画圈处的核心)
    async function checkGlobalUnread() {
        const { data } = await supabaseClient.from('messages').select('id').eq('receiver', currentUser.name).eq('is_read', false);
        const navBadge = document.getElementById('global-unread-badge');
        if (data && data.length > 0) {
            navBadge.innerText = data.length;
            navBadge.classList.remove('hidden');
        } else {
            navBadge.classList.add('hidden');
        }
        return data || [];
    }

    async function loadChatSessionList() {
        const { data: msgs } = await supabaseClient.from('messages').select('*').or(`sender.eq."${currentUser.name}",receiver.eq."${currentUser.name}"`).order('id', {ascending:false});
        if (!msgs) return;
        
        const unreads = await checkGlobalUnread();
        const interlocutors = [...new Set(msgs.map(m => m.sender === currentUser.name ? m.receiver : m.sender))];

        document.getElementById('chat-list-container').innerHTML = interlocutors.map(user => {
            const last = msgs.find(m => m.sender === user || m.receiver === user);
            const count = unreads.filter(u => u.sender === user).length;

            return `
                <div class="card" onclick="openPrivateChat('${user}')" style="display:flex; align-items:center; cursor:pointer; padding:15px; margin-bottom:12px;">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=${user}" style="width:55px; height:55px; border-radius:50%; margin-right:15px; background:#f0f2f5;">
                    <div style="flex:1; min-width:0;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
                            <b style="font-size:17px;">${user}</b>
                            ${count > 0 ? `<div class="msg-status-dot">${count}</div>` : ''}
                        </div>
                        <div style="color:var(--text-gray); font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${last.content}</div>
                    </div>
                </div>`;
        }).join('') || '<div style="text-align:center; padding:100px 0; color:#cbd5e0;">寂静无声，主动去发个私信吧！</div>';
    }

    // 9. 🎯 上帝管理逻辑：禁言系统
    async function toggleGodManager() {
        const box = document.getElementById('god-manager-box');
        box.classList.toggle('hidden');
        if (!box.classList.contains('hidden')) {
            const { data } = await supabaseClient.from('profiles').select('*').order('last_login', {ascending:false});
            document.getElementById('god-user-list').innerHTML = (data || []).map(u => `
                <div class="ban-status-row">
                    <img src="${u.avatar}" style="width:35px; height:35px; border-radius:50%; margin-right:12px;">
                    <b style="flex:1;">${u.username}</b>
                    <button class="ban-toggle-btn ${u.is_banned ? 'ban-active' : ''}" onclick="executeBanCommand('${u.username}', ${u.is_banned})">
                        ${u.is_banned ? '🟢 解除封禁' : '🔴 执行禁言'}
                    </button>
                </div>
            `).join('');
        }
    }

    async function executeBanCommand(username, currentStatus) {
        if (username === MASTER_NAME) return alert("主理人拥有免疫权，不可封禁。");
        if (confirm(`【上帝指令】您确定要对校友 [${username}] 执行该状态变更吗？`)) {
            const { error } = await supabaseClient.from('profiles').update({ is_banned: !currentStatus }).eq('username', username);
            if (!error) toggleGodManager(); // 刷新
        }
    }

    // 10. 实时同步引擎
    function startRealtimeEngine() {
        supabaseClient.channel('sango-stream').on('postgres_changes', { event: '*', schema: 'public', table: '*' }, (payload) => {
            if (payload.table === 'messages') {
                checkGlobalUnread();
                if (chatPartner) loadChatContent();
                if (document.getElementById('view-chat').classList.contains('active')) loadChatSessionList();
            } else {
                refreshWallFeed();
            }
        }).subscribe();
    }

    // 11. 其它交互逻辑 (点赞、评论、删除、图片处理)
    async function togglePostLike(pid, count) {
        let likes = JSON.parse(localStorage.getItem('SANGO_LIKES') || "[]");
        const idx = likes.indexOf(pid);
        let n = (idx === -1) ? (count + 1) : Math.max(0, count - 1);
        (idx === -1) ? likes.push(pid) : likes.splice(idx, 1);
        localStorage.setItem('SANGO_LIKES', JSON.stringify(likes));
        await supabaseClient.from('posts').update({ likes: n }).eq('id', pid);
    }

    async function submitComment(pid) {
        const inp = document.getElementById('input-cmt-' + pid);
        const val = inp.value.trim();
        if (!val) return;
        await supabaseClient.from('comments').insert([{ post_id: pid, username: currentUser.name, content: val }]);
        inp.value = "";
    }

    async function deletePostAction(id) { if(confirm("确定抹除这条动态？")) await supabaseClient.from('posts').delete().eq('id', id); }
    async function deleteCmtAction(id) { if(confirm("确定删除这条回复？")) await supabaseClient.from('comments').delete().eq('id', id); }
    async function togglePinStatus(id, s) { await supabaseClient.from('posts').update({ is_notice: !s }).eq('id', id); }

    function handleImageProcess(input, type) {
        if (!input.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image(); img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const max = type === 'USER_HEAD' ? 150 : 800;
                canvas.width = max; canvas.height = img.height * (max / img.width);
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                const base64 = canvas.toDataURL('image/jpeg', 0.75);
                if (type === 'USER_HEAD') {
                    document.getElementById('avatar-preview').src = base64;
                    document.getElementById('avatar-preview').classList.remove('hidden');
                    document.getElementById('avatar-placeholder').classList.add('hidden');
                } else {
                    postImageCache = base64;
                    document.getElementById('post-img-display').src = base64;
                    document.getElementById('post-img-preview-box').classList.remove('hidden');
                }
            };
        };
        reader.readAsDataURL(input.files[0]);
    }

    function switchView(viewName) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById('view-' + viewName).classList.add('active');
        event.currentTarget.classList.add('active');
        if (viewName === 'chat') loadChatSessionList();
    }

    async function openPrivateChat(target) {
        if (target === currentUser.name) return;
        chatPartner = target;
        document.getElementById('active-chat-name').innerText = target;
        document.getElementById('chat-window-overlay').classList.remove('hidden');
        await supabaseClient.from('messages').update({ is_read: true }).eq('receiver', currentUser.name).eq('sender', target);
        checkGlobalUnread();
        loadChatContent();
    }

    async function loadChatContent() {
        const { data } = await supabaseClient.from('messages').select('*').or(`and(sender.eq."${currentUser.name}",receiver.eq."${chatPartner}"),and(sender.eq."${chatPartner}",receiver.eq."${currentUser.name}")`).order('id', {ascending:true});
        document.getElementById('chat-message-stream').innerHTML = (data || []).map(m => `
            <div style="max-width:85%; padding:15px; border-radius:22px; font-size:16px; ${m.sender === currentUser.name ? 'align-self:flex-end; background:var(--primary); color:#fff; border-bottom-right-radius:4px;' : 'align-self:flex-start; background:#fff; color:var(--text-dark); border-bottom-left-radius:4px; box-shadow:0 3px 10px rgba(0,0,0,0.05);'}">
                ${m.content}
            </div>
        `).join('');
        const stream = document.getElementById('chat-message-stream'); stream.scrollTop = stream.scrollHeight;
    }

    async function sendChatMessage() {
        const input = document.getElementById('chat-message-input');
        const content = input.value.trim();
        if (!content || !chatPartner) return;
        await supabaseClient.from('messages').insert([{ sender: currentUser.name, receiver: chatPartner, content: content, is_read: false }]);
        input.value = "";
        loadChatContent();
    }

    function setPostColor(c, el) { selectedColor = c; document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active')); el.classList.add('active'); }
    function clearPostImage() { postImageCache = ""; document.getElementById('post-img-preview-box').classList.add('hidden'); }
    function closeChatWindow() { document.getElementById('chat-window-overlay').classList.add('hidden'); chatPartner = null; }
    function handleAppLogout() { if(confirm("确定要离开三高表白墙吗？")) { localStorage.clear(); location.reload(); } }

</script>
</body>
