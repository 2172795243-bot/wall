<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校园表白墙</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f6f7fb;}
.header{background:#ff4d6d;color:white;padding:18px;text-align:center;font-size:20px;}
.container{max-width:600px;margin:auto;padding:15px;}
.card{background:white;padding:15px;border-radius:14px;margin-top:12px;}
input,textarea{width:100%;padding:10px;margin-top:8px;border-radius:10px;border:1px solid #eee;}
button{width:100%;margin-top:10px;padding:10px;border:none;border-radius:10px;background:#ff4d6d;color:white;}
.actions{display:flex;gap:12px;color:#ff4d6d;margin-top:5px;}
.comment{background:#f2f2f2;padding:6px;margin-top:5px;border-radius:6px;font-size:13px;}
</style>
</head>

<body>

<div class="header">💌 校园表白墙</div>

<div class="container">

<div id="auth" class="card">
<input id="email" placeholder="邮箱">
<input id="password" type="password" placeholder="密码">
<input id="username" placeholder="昵称">
<button onclick="login()">登录 / 注册</button>
</div>

<div id="app" style="display:none;">
<div class="card">
<textarea id="content" placeholder="写点什么..."></textarea>
<button onclick="addPost()">发布</button>
</div>

<div id="posts"></div>
</div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://ljopokentjagtxwdlzma.supabase.co",
  "sb_publishable_OgGGB2YH9O8rv0Vg3K8jEA_rbxA7ZHk"
);

const ADMIN_ID = "";

let currentUser = null;
let currentName = "";

// 登录
async function login(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;
  let username = document.getElementById("username").value;

  let { error } = await supabaseClient.auth.signInWithPassword({email,password});

  if(error){
    await supabaseClient.auth.signUp({email,password});
    alert("注册成功，请再点一次登录");
  }else{
    currentName = username;
    checkUser();
  }
}

// 检查用户
async function checkUser(){
  let { data } = await supabaseClient.auth.getUser();
  if(data.user){
    currentUser = data.user.id;
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";
    loadPosts();
  }
}

// 发帖
async function addPost(){
  let text = document.getElementById("content").value;
  if(!text) return alert("不能为空");

  await supabaseClient.from("posts").insert([{
    content:text,
    user_id:currentUser,
    username:currentName
  }]);

  document.getElementById("content").value="";
  loadPosts();
}

// 点赞
async function likePost(id,likes){
  await supabaseClient.from("posts")
    .update({likes:likes+1})
    .eq("id",id);
  loadPosts();
}

// 删除
async function deletePost(id,user_id){
  if(currentUser===ADMIN_ID || currentUser===user_id){
    await supabaseClient.from("posts").delete().eq("id",id);
    loadPosts();
  }
}

// 评论
async function addComment(post_id){
  let text = prompt("评论：");
  if(!text) return;

  await supabaseClient.from("comments").insert([{
    post_id,
    content:text,
    username:currentName
  }]);

  loadPosts();
}

// 加载
async function loadPosts(){
  let { data:posts } = await supabaseClient.from("posts")
    .select("*").order("id",{ascending:false});

  let { data:comments } = await supabaseClient.from("comments").select("*");

  let html="";

  posts.forEach(p=>{
    let cs = comments.filter(c=>c.post_id===p.id);

    html+=`
    <div class="card">
      <b>${p.username || "匿名"}</b>
      <div>${p.content}</div>
      <div class="actions">
        <span onclick="likePost(${p.id},${p.likes})">❤️ ${p.likes}</span>
        <span onclick="addComment(${p.id})">💬 评论</span>
        <span onclick="deletePost(${p.id},'${p.user_id}')">🗑 删除</span>
      </div>
      ${cs.map(c=>`<div class="comment">${c.username}: ${c.content}</div>`).join("")}
    </div>`;
  });

  document.getElementById("posts").innerHTML = html;
}

checkUser();
</script>

</body>
</html>
