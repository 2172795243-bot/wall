<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>灵宝市第三高中表白墙 | HeAI（作者）定制版</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        /* ================================================================
           1. 视觉核心规范 (保持 UI 质感)
           ================================================================
        */
        :root {
            --primary: #0984e3;           
            --bg-gray: #f4f7f6;           
            --card-radius: 24px;          
            --admin-gold: #f1c40f;        
            --danger-red: #e74c3c;        
            --success-green: #2ecc71;     
            --text-main: #2d3436;         
            --text-sub: #636e72;          
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-gray);
            color: var(--text-main);
            padding-bottom: 90px;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            scroll-behavior: smooth; /* 平滑滚动，用于跳转回复 */
        }

        /* ================================================================
           2. 底部导航与信号气泡
           ================================================================
        */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 75px;
            background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(0,0,0,0.06); z-index: 9999;
            padding-bottom: env(safe-area-inset-bottom);
            box-shadow: 0 -5px 25px rgba(0,0,0,0.04);
        }

        .tab-item {
            display: flex; flex-direction: column; align-items: center; flex: 1;
            color: #bdc3c7; cursor: pointer; transition: 0.3s ease; position: relative;
        }

        .tab-item.active { color: var(--primary); font-weight: 800; transform: translateY(-3px); }
        .tab-item i { font-size: 24px; margin-bottom: 4px; }

        /* 呼吸红点信号 */
        .signal-dot {
            position: absolute; top: 2px; right: 22%;
            background: var(--danger-red); color: #fff; font-size: 10px;
            min-width: 18px; height: 18px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #fff; font-weight: bold;
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.6); }
            70% { box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        /* ================================================================
           3. 新增：通知专区样式 (私信页顶部)
           ================================================================
        */
        .notify-zone {
            background: linear-gradient(135deg, #ffffff 0%, #f0f7ff 100%);
            border-radius: var(--card-radius);
            padding: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(9, 132, 227, 0.1);
            box-shadow: 0 8px 20px rgba(9, 132, 227, 0.05);
        }

        .notify-item {
            display: flex; align-items: center;
            padding: 12px; background: #fff; border-radius: 16px;
            margin-top: 10px; cursor: pointer; border-left: 4px solid var(--primary);
            transition: 0.2s;
        }
        .notify-item:active { transform: scale(0.98); }

        /* ================================================================
           4. 布局与容器
           ================================================================
        */
        .container { max-width: 600px; margin: 0 auto; padding: 15px; display: none; }
        .container.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: #fff; border-radius: var(--card-radius); padding: 20px; margin-bottom: 15px; box-shadow: var(--shadow-soft); position: relative; }
        .pin-notice { background: linear-gradient(135deg, #ffffff, #fffcf0); border: 2.5px solid var(--admin-gold); }
        .notice-label { background: var(--admin-gold); color: #fff; font-size: 11px; padding: 4px 12px; border-radius: 8px; font-weight: 900; }

        /* 管理员标识 */
        .admin-badge { font-size: 10px; border: 1.5px solid var(--primary); color: var(--primary); padding: 1px 6px; border-radius: 5px; margin-left: 8px; font-weight: bold; }
        .admin-del-btn { color: var(--danger-red); font-size: 13px; font-weight: bold; cursor: pointer; padding: 6px 14px; border-radius: 12px; background: rgba(231, 76, 60, 0.06); margin-left: auto; }

        /* 输入框 */
        .wall-input { width: 100%; padding: 15px; border-radius: 18px; border: 2px solid #f1f3f5; background: #f8fafc; font-size: 16px; outline: none; transition: 0.3s; }
        .wall-input:focus { border-color: var(--primary); background: #fff; }

        .btn-confirm { background: var(--primary); color: #fff; border: none; padding: 12px 28px; border-radius: 16px; font-weight: bold; cursor: pointer; }

        /* 管理员配色球 */
        .color-orb { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 3px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .color-orb.selected { transform: scale(1.3); border-color: #2d3436; }

        .t-blue { color: #0984e3 !important; }
        .t-green { color: #2ecc71 !important; }
        .t-red { color: #e74c3c !important; }
        .t-gold { color: #f1c40f !important; }
        .t-black { color: #2d3436 !important; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="page-login" class="container active" style="margin-top: 80px; display: block;">
    <div class="card" style="text-align: center; padding: 50px 30px;">
        <div style="width: 110px; height: 110px; border-radius: 50%; background: #f0f3f5; margin: 0 auto 30px; border: 3px dashed #d1d5db; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer;" onclick="document.getElementById('file-avatar').click()">
            <span id="txt-plus" style="font-size: 40px; color: #9ca3af;">+</span>
            <img id="img-avatar-pre" class="hidden" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <input type="file" id="file-avatar" hidden onchange="processMedia(this, 'AVATAR')">

        <h1 style="margin:0; font-size:26px; color:var(--primary);">灵宝市第三高中</h1>
        <p style="color:var(--text-sub); font-size:14px; margin-top:5px; font-weight: bold;">HeAI（作者）专属维护版</p>

        <div style="margin-top:40px;">
            <input id="in-nickname" class="wall-input" maxlength="15" placeholder="你的校友名称">
            <input id="in-admin-pw" class="wall-input" type="password" style="margin-top:15px;" placeholder="管理员密令 (HeAI专属)">
            
            <button class="btn-confirm" style="width:100%; height:55px; margin-top:25px; font-size:17px;" onclick="handleLogin()">进入三高墙</button>
        </div>
    </div>
</div>

<div id="app-body" class="hidden">
    
    <div id="view-wall" class="container active">
        <div class="card">
            <div style="display:flex; align-items:flex-start;">
                <img id="my-wall-head" style="width:45px; height:45px; border-radius:50%; margin-right:15px; background:#eee;">
                <textarea id="post-text" class="wall-input" style="border:none; background:transparent; padding:0; height:100px; resize:none; font-size:18px;" placeholder="这一刻，想大声告诉谁？"></textarea>
            </div>

            <div id="post-img-box" class="hidden" style="margin:15px 0;">
                <div style="position:relative; display:inline-block;">
                    <img id="img-post-pre" style="width:140px; border-radius:15px;">
                    <span style="position:absolute; top:-8px; right:-8px; background:#2d3436; color:#fff; width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="clearMedia()">×</span>
                </div>
            </div>

            <div id="admin-post-tools" class="hidden" style="border-top:2px dashed #f0f0f0; margin-top:20px; padding-top:20px;">
                <div style="display:flex; gap:12px; margin:15px 0; align-items:center;">
                    <span style="font-size:13px; font-weight:bold; color:var(--text-sub);">管理员色系：</span>
                    <div class="color-orb selected" style="background:#0984e3" onclick="selectColor('blue', this)"></div>
                    <div class="color-orb" style="background:#2ecc71" onclick="selectColor('green', this)"></div>
                    <div class="color-orb" style="background:#e74c3c" onclick="selectColor('red', this)"></div>
                    <div class="color-orb" style="background:#f1c40f" onclick="selectColor('gold', this)"></div>
                    <div class="color-orb" style="background:#2d3436" onclick="selectColor('black', this)"></div>
                </div>
                <div style="display:flex; align-items:center; margin-bottom:15px;">
                    <input type="checkbox" id="check-pin" style="width:18px; height:18px; margin-right:10px;">
                    <label for="check-pin" style="font-weight:bold; color:var(--admin-gold);">设为红头置顶公告</label>
                </div>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid #f8f9fa; padding-top:15px;">
                <div style="cursor:pointer;" onclick="document.getElementById('file-post-img').click()">
                    <span style="font-size:26px;">🖼️</span>
                    <span style="margin-left:8px; font-weight:600; color:var(--text-sub); font-size:14px;">发照片</span>
                </div>
                <input type="file" id="file-post-img" hidden onchange="processMedia(this, 'POST')">
                <button class="btn-confirm" onclick="submitToWall()">发布动态</button>
            </div>
        </div>

        <div id="wall-stream"></div>
    </div>

    <div id="view-messages" class="container">
        <div class="notify-zone">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <b style="color:var(--primary); font-size:16px;">🔔 回复提醒专区</b>
                <span style="font-size:11px; color:var(--text-sub);" onclick="clearAllNotifications()">清空提醒</span>
            </div>
            <div id="notification-list">
                <div style="text-align:center; padding:20px 0; color:#bdc3c7; font-size:13px;">暂无新回复提醒</div>
            </div>
        </div>

        <h2 style="padding:0 10px; margin-bottom:20px; font-size:20px;">📧 校友私信</h2>
        <div id="session-list"></div>
    </div>

    <div id="view-profile" class="container">
        <div class="card" style="text-align:center; padding:50px 20px;">
            <img id="profile-head" style="width:120px; height:120px; border-radius:50%; border:5px solid #fff; box-shadow:0 10px 25px rgba(0,0,0,0.1);">
            <h2 id="profile-name" style="margin:15px 0 5px 0; font-size:24px;">...</h2>
            <div id="profile-badge"></div>

            <div style="margin-top:50px; display:grid; gap:15px;">
                <button id="btn-admin-mgr" class="btn-confirm hidden" style="background:#2d3436; height:55px; border-radius:20px;" onclick="openAdminManager()">
                    ⚙️ 管理员控制台 (校友管控)
                </button>
                <button class="btn-confirm" style="background:var(--text-sub); height:55px; border-radius:20px;" onclick="userLogout()">退出系统</button>
            </div>
        </div>

        <div id="admin-mgr-box" class="card hidden">
            <h3 style="color:var(--danger-red);">全校成员名单</h3>
            <div id="all-user-list"></div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="switchView('wall', event)">
            <i>🏛️</i><span>广场</span>
        </div>
        <div class="tab-item" onclick="switchView('messages', event)">
            <i>📧</i><span>消息</span>
            <div id="badge-global" class="signal-dot hidden">0</div>
        </div>
        <div class="tab-item" onclick="switchView('profile', event)">
            <i>👤</i><span>我的</span>
        </div>
    </div>
</div>

<div id="msg-overlay" class="hidden" style="position:fixed; top:0; left:0; right:0; bottom:0; background:#f4f7f6; z-index:10001; display:flex; flex-direction:column;">
    <div style="background:#fff; padding:20px; display:flex; align-items:center; border-bottom:1px solid #eee; padding-top:calc(env(safe-area-inset-top) + 15px);">
        <div onclick="closeMsgOverlay()" style="font-size:22px; cursor:pointer; width:40px;">✕</div>
        <b id="msg-target-name" style="flex:1; text-align:center;">对话中</b>
        <div style="width:40px;"></div>
    </div>
    <div id="msg-stream" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px;"></div>
    <div style="padding:15px; background:#fff; border-top:1px solid #eee; display:flex; gap:10px; padding-bottom:calc(env(safe-area-inset-bottom) + 10px);">
        <input id="in-msg" class="wall-input" style="margin:0; border-radius:30px; height:45px;" placeholder="发送私密消息...">
        <button class="btn-confirm" style="border-radius:30px;" onclick="sendPrivateMsg()">发送</button>
    </div>
</div>

<script>
    /* ================================================================
       逻辑控制器 - V28 HeAI（作者）版
       ================================================================
    */

    const API_URL = "https://ljopokentjagtxwdlzma.supabase.co";
    const API_KEY = "sb_publishable_OgGGB2YH9O8rv0Vg3K8jEA_rbxA7ZHk";
    const sango = supabase.createClient(API_URL, API_KEY);

    let me = null;
    let cachedB64 = "";
    let curPartner = null;
    let curColor = "blue";
    
    // 作者身份定义
    const ADMIN_USER = "HeAI（作者）";
    const ADMIN_PASS = "hzc123456";

    window.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('SANGO_USER_V28');
        if (saved) { me = JSON.parse(saved); launchApp(); }
    });

    async function handleLogin() {
        const name = document.getElementById('in-nickname').value.trim();
        const pass = document.getElementById('in-admin-pw').value.trim();
        if (!name) return alert("请输入校友称呼！");
        if (name === ADMIN_USER && pass !== ADMIN_PASS) return alert("密令核验失败！");

        const { data: profile } = await sango.from('profiles').select('*').eq('username', name).single();
        if (profile && profile.is_banned) return alert("该账户已被封禁！");

        me = {
            name: name,
            avatar: document.getElementById('img-avatar-pre').src || `https://api.dicebear.com/7.x/identicon/svg?seed=${name}`,
            isAdmin: (name === ADMIN_USER)
        };

        await sango.from('profiles').upsert([{ username: name, avatar: me.avatar, last_login: new Date() }]);
        localStorage.setItem('SANGO_USER_V28', JSON.stringify(me));
        launchApp();
    }

    function launchApp() {
        document.getElementById('page-login').style.display = 'none';
        document.getElementById('app-body').classList.remove('hidden');
        document.getElementById('profile-name').innerText = me.name;
        document.getElementById('my-wall-head').src = me.avatar;
        document.getElementById('profile-head').src = me.avatar;

        if (me.isAdmin) {
            document.getElementById('admin-post-tools').classList.remove('hidden');
            document.getElementById('btn-admin-mgr').classList.remove('hidden');
            document.getElementById('profile-badge').innerHTML = '<span class="notice-label">官方维护者</span>';
        }

        renderWall();
        syncData();
        updateGlobalBadge();
        renderNotifications(); // 初始化通知
    }

    // 板块切换修复
    function switchView(id, e) {
        document.querySelectorAll('.container').forEach(c => { c.classList.remove('active'); c.style.display = 'none'; });
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        
        const target = document.getElementById('view-' + id);
        target.classList.add('active'); target.style.display = 'block';
        if(e) e.currentTarget.classList.add('active');

        if(id === 'messages') { renderSessions(); renderNotifications(); }
        if(id === 'wall') renderWall();
    }

    // 渲染墙面
    async function renderWall() {
        const { data: posts } = await sango.from('posts').select('*').order('is_notice', {ascending:false}).order('id', {ascending:false});
        const { data: cmts } = await sango.from('comments').select('*').order('id', {ascending:true});
        const likes = JSON.parse(localStorage.getItem('SANGO_LIKES') || "[]");

        let html = "";
        (posts || []).forEach(p => {
            const pCmts = (cmts || []).filter(c => c.post_id === p.id);
            const liked = likes.includes(p.id);
            let bodyText = p.content, cClass = "";
            if (p.username === ADMIN_USER && p.content.startsWith('[color:')) {
                const match = p.content.match(/\[color:(\w+)\](.*)/s);
                if (match) { cClass = "t-" + match[1]; bodyText = match[2]; }
            }

            html += `
                <div class="card ${p.is_notice ? 'pin-notice' : ''}" id="post-anchor-${p.id}">
                    <div style="display:flex; align-items:center; margin-bottom:12px;">
                        ${p.is_notice ? '<span class="notice-label">三高置顶</span>' : ''}
                        <img src="${p.avatar}" style="width:42px; height:42px; border-radius:50%; margin-right:12px;">
                        <div style="flex:1">
                            <b class="${cClass}">${p.username}</b>
                            ${p.username === ADMIN_USER ? '<span class="admin-badge">作者</span>' : ''}
                        </div>
                        ${(p.username === me.name || me.isAdmin) ? `<span class="admin-del-btn" onclick="killPost(${p.id})">删除</span>` : ''}
                    </div>
                    <div style="font-size:17px; white-space:pre-wrap; line-height:1.7;" class="${cClass}">${bodyText}</div>
                    ${p.post_img ? `<img src="${p.post_img}" style="width:100%; border-radius:15px; margin-top:12px;">` : ''}
                    <div style="display:flex; gap:18px; margin-top:18px; color:var(--text-sub); font-size:14px; font-weight:bold;">
                        <span onclick="doLike(${p.id}, ${p.likes})" style="cursor:pointer; ${liked ? 'color:var(--danger-red)' : ''}">❤️ ${p.likes || 0}</span>
                        <span onclick="document.getElementById('in-cmt-${p.id}').focus()" style="cursor:pointer;">💬 ${pCmts.length}评论</span>
                        <span onclick="openChat('${p.username}')" style="cursor:pointer; color:var(--primary);">📧 悄密</span>
                    </div>
                    <div style="margin-top:12px; padding-top:12px; border-top:1px solid #f9f9f9;">
                        ${pCmts.map(c => `
                            <div style="margin-bottom:6px; font-size:14px;">
                                <b>${c.username}</b>: ${c.content}
                            </div>
                        `).join('')}
                        <div style="display:flex; gap:8px; margin-top:8px;">
                            <input id="in-cmt-${p.id}" class="wall-input" style="padding:8px; height:35px; font-size:12px;" placeholder="回复...">
                            <button class="btn-confirm" style="padding:0 12px; font-size:11px; height:35px;" onclick="addCmt(${p.id}, '${p.username}')">回复</button>
                        </div>
                    </div>
                </div>`;
        });
        document.getElementById('wall-stream').innerHTML = html || '<div style="text-align:center; padding:80px 0;">空空如也</div>';
    }

    // 提交动态
    async function submitToWall() {
        const text = document.getElementById('post-text').value.trim();
        const pinned = document.getElementById('check-pin').checked && me.isAdmin;
        if (!text && !cachedB64) return;
        const body = me.isAdmin ? `[color:${curColor}]${text}` : text;
        await sango.from('posts').insert([{ username: me.name, content: body, avatar: me.avatar, post_img: cachedB64, is_notice: pinned }]);
        document.getElementById('post-text').value = ""; clearMedia(); renderWall();
    }

    // 核心新增：添加评论并触发通知
    async function addCmt(pid, postOwner) {
        const inp = document.getElementById('in-cmt-' + pid);
        const val = inp.value.trim();
        if (!val) return;

        // 1. 提交评论
        await sango.from('comments').insert([{ post_id: pid, username: me.name, content: val }]);

        // 2. 如果不是回复自己，就给发帖人发通知
        if (postOwner !== me.name) {
            await sango.from('messages').insert([{
                sender: 'SYSTEM_NOTICE', // 特殊标识：系统通知
                receiver: postOwner,
                content: `<b>${me.name}</b> 在你的动态下评论了：${val}`,
                is_read: false,
                jump_id: pid // 记录跳转 ID
            }]);
        }
        inp.value = ""; renderWall();
    }

    // 核心新增：渲染通知专区
    async function renderNotifications() {
        const { data } = await sango.from('messages').select('*').eq('receiver', me.name).eq('sender', 'SYSTEM_NOTICE').order('id', {ascending:false});
        const list = document.getElementById('notification-list');
        if (data && data.length > 0) {
            list.innerHTML = data.map(n => `
                <div class="notify-item" onclick="jumpToPost(${n.jump_id}, ${n.id})">
                    <div style="font-size:14px; color:var(--text-main);">${n.content}</div>
                </div>
            `).join('');
        } else {
            list.innerHTML = '<div style="text-align:center; padding:20px 0; color:#bdc3c7; font-size:13px;">暂无新回复提醒</div>';
        }
    }

    // 核心新增：跳转逻辑
    async function jumpToPost(pid, notifyId) {
        // 1. 先把这条通知删了（或者标为已读，这里直接删了更清爽）
        await sango.from('messages').delete().eq('id', notifyId);
        // 2. 切到广场
        switchView('wall');
        // 3. 延迟滚动定位（等渲染完）
        setTimeout(() => {
            const anchor = document.getElementById('post-anchor-' + pid);
            if (anchor) {
                anchor.scrollIntoView({ behavior: 'smooth', block: 'center' });
                anchor.style.boxShadow = "0 0 20px rgba(9, 132, 227, 0.4)"; // 高亮闪烁一下
                setTimeout(() => anchor.style.boxShadow = "", 2000);
            }
        }, 300);
    }

    async function clearAllNotifications() {
        await sango.from('messages').delete().eq('receiver', me.name).eq('sender', 'SYSTEM_NOTICE');
        renderNotifications();
    }

    // 私信相关逻辑 (过滤掉系统通知)
    async function renderSessions() {
        const { data: msgs } = await sango.from('messages').select('*').or(`sender.eq."${me.name}",receiver.eq."${me.name}"`).neq('sender', 'SYSTEM_NOTICE').neq('receiver', 'SYSTEM_NOTICE').order('id', {ascending:false});
        if (!msgs) return;
        const { data: unreads } = await sango.from('messages').select('sender').eq('receiver', me.name).eq('is_read', false).neq('sender', 'SYSTEM_NOTICE');
        const partners = [...new Set(msgs.map(m => m.sender === me.name ? m.receiver : m.sender))];
        document.getElementById('session-list').innerHTML = partners.map(user => {
            const last = msgs.find(m => m.sender === user || m.receiver === user);
            const count = (unreads || []).filter(u => u.sender === user).length;
            return `
                <div class="card" onclick="openChat('${user}')" style="display:flex; align-items:center; cursor:pointer;">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=${user}" style="width:50px; height:50px; border-radius:50%; margin-right:15px;">
                    <div style="flex:1; min-width:0;">
                        <div style="display:flex; justify-content:space-between;"><b>${user}</b>${count > 0 ? `<div class="signal-dot">${count}</div>` : ''}</div>
                        <div style="font-size:13px; color:var(--text-sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${last.content}</div>
                    </div>
                </div>`;
        }).join('') || '<div style="text-align:center; padding:50px 0;">无私信</div>';
    }

    // 实时同步
    function syncData() {
        sango.channel('global').on('postgres_changes', { event: '*', schema: 'public', table: '*' }, (p) => {
            if (p.table === 'messages') { 
                updateGlobalBadge(); 
                if(document.getElementById('view-messages').classList.contains('active')) { renderSessions(); renderNotifications(); }
            } else { renderWall(); }
        }).subscribe();
    }

    async function updateGlobalBadge() {
        const { data } = await sango.from('messages').select('id').eq('receiver', me.name).eq('is_read', false);
        const b = document.getElementById('badge-global');
        if (data && data.length > 0) { b.innerText = data.length; b.classList.remove('hidden'); } else { b.classList.add('hidden'); }
    }

    // 基础交互函数
    async function doLike(pid, n) {
        let likes = JSON.parse(localStorage.getItem('SANGO_LIKES') || "[]");
        const idx = likes.indexOf(pid);
        let count = (idx === -1) ? (n + 1) : Math.max(0, n - 1);
        (idx === -1) ? likes.push(pid) : likes.splice(idx, 1);
        localStorage.setItem('SANGO_LIKES', JSON.stringify(likes));
        await sango.from('posts').update({ likes: count }).eq('id', pid);
    }

    function processMedia(input, mode) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image(); img.src = e.target.result;
            img.onload = () => {
                const cvs = document.createElement('canvas');
                const max = mode === 'AVATAR' ? 150 : 800;
                cvs.width = max; cvs.height = img.height * (max/img.width);
                cvs.getContext('2d').drawImage(img, 0, 0, cvs.width, cvs.height);
                const b64 = cvs.toDataURL('image/jpeg', 0.8);
                if (mode === 'AVATAR') { document.getElementById('img-avatar-pre').src = b64; document.getElementById('img-avatar-pre').classList.remove('hidden'); document.getElementById('txt-plus').classList.add('hidden'); }
                else { cachedB64 = b64; document.getElementById('img-post-pre').src = b64; document.getElementById('post-img-box').classList.remove('hidden'); }
            };
        };
        reader.readAsDataURL(input.files[0]);
    }

    async function openChat(p) { curPartner = p; document.getElementById('msg-target-name').innerText = p; document.getElementById('msg-overlay').classList.remove('hidden'); await sango.from('messages').update({ is_read: true }).eq('receiver', me.name).eq('sender', p); updateGlobalBadge(); loadMsg(); }
    async function loadMsg() { 
        const { data } = await sango.from('messages').select('*').or(`and(sender.eq."${me.name}",receiver.eq."${curPartner}"),and(sender.eq."${curPartner}",receiver.eq."${me.name}")`).neq('sender', 'SYSTEM_NOTICE').order('id', {ascending:true});
        document.getElementById('msg-stream').innerHTML = (data || []).map(m => `
            <div style="max-width:80%; padding:12px; border-radius:18px; ${m.sender === me.name ? 'align-self:flex-end; background:var(--primary); color:#fff;' : 'align-self:flex-start; background:#fff;'}">${m.content}</div>
        `).join('');
        const s = document.getElementById('msg-stream'); s.scrollTop = s.scrollHeight;
    }
    async function sendPrivateMsg() { const v = document.getElementById('in-msg').value.trim(); if(!v) return; await sango.from('messages').insert([{sender:me.name, receiver:curPartner, content:v}]); document.getElementById('in-msg').value = ""; loadMsg(); }

    function selectColor(c, el) { curColor = c; document.querySelectorAll('.color-orb').forEach(o => o.classList.remove('selected')); el.classList.add('selected'); }
    function clearMedia() { cachedB64 = ""; document.getElementById('post-img-box').classList.add('hidden'); }
    function closeMsgOverlay() { document.getElementById('msg-overlay').classList.add('hidden'); curPartner = null; }
    function userLogout() { localStorage.clear(); location.reload(); }
    async function killPost(id) { if(confirm("删除此动态？")) await sango.from('posts').delete().eq('id', id); }

</script>
</body>
</html>
