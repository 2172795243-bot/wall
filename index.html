<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>校园万事屋 | 旗舰全能版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root { --primary: #0984e3; --bg: #f0f2f5; --radius: 16px; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); padding-bottom: 80px; }
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: #fff; display: flex; border-top: 1px solid #eee; z-index: 2000; padding-bottom: env(safe-area-inset-bottom); }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; color: #636e72; cursor: pointer; position: relative; }
        .tab-item.active { color: var(--primary); font-weight: bold; }
        .badge { position: absolute; top: 8px; right: 25%; background: #ff4757; color: white; border-radius: 10px; min-width: 16px; height: 16px; font-size: 10px; display: flex; align-items: center; justify-content: center; padding: 0 4px; border: 2px solid #fff; }
        .container { max-width: 580px; margin: 0 auto; padding: 15px; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; border-radius: var(--radius); padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); position: relative; }
        .is-notice { border: 2px solid #fab005; background: #fffbe6 !important; }
        
        /* 调色盘与颜色类 */
        .color-blue { color: #0984e3 !important; font-weight: bold; }
        .color-green { color: #00b894 !important; font-weight: bold; }
        .color-red { color: #d63031 !important; font-weight: bold; }
        .color-gold { color: #e1b12c !important; font-weight: bold; }
        .color-black { color: #2d3436 !important; font-weight: bold; }
        .color-picker { display: flex; gap: 10px; margin: 10px 0; align-items: center; }
        .dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .dot.active { border-color: #636e72; transform: scale(1.2); }

        .u-info { display: flex; align-items: center; margin-bottom: 10px; }
        .u-head { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; margin-right: 12px; background: #eee; border: 1px solid #eee; }
        .admin-tag { font-size: 10px; border: 1px solid currentColor; padding: 0 4px; border-radius: 4px; margin-left: 5px; }
        .action-bar { display: flex; gap: 20px; margin-top: 12px; padding-top: 10px; border-top: 1px solid #f0f0f0; font-size: 13px; }
        .cmt-area { background: #f8fafc; border-radius: 10px; padding: 10px; margin-top: 10px; font-size: 13px; }
        .in-field { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; outline: none; }
        .btn-blue { background: var(--primary); color: white; border: none; padding: 8px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .del-btn { color: #ff7675; cursor: pointer; font-size: 12px; }
        .hidden { display: none !important; }
        
        /* 聊天系统样式 */
        .user-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
        .online { background: #55efc4; box-shadow: 0 0 5px #55efc4; }
        .msg-bubble { padding: 10px 15px; border-radius: 15px; margin-bottom: 10px; max-width: 85%; font-size: 14px; position: relative; word-wrap: break-word; }
        .msg-mine { background: var(--primary); color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg-other { background: #e4e6eb; color: #000; align-self: flex-start; border-bottom-left-radius: 2px; }
    </style>
</head>
<body>

<div id="page-auth" class="container" style="margin-top: 50px;">
    <div class="card" style="text-align:center; padding:30px;">
        <div id="avatar-box" style="width:85px;height:85px;border-radius:50%;background:#f0f2f5;margin:0 auto 15px;overflow:hidden;border:2px dashed #ccc;display:flex;align-items:center;justify-content:center;cursor:pointer;" onclick="document.getElementById('file-avatar').click()">
            <span id="a-plus" style="font-size:30px;color:#999">+</span><img id="a-img" class="hidden" style="width:100%;height:100%;object-fit:cover;">
        </div>
        <input type="file" id="file-avatar" hidden accept="image/*" onchange="uploadImg(this, 'me')">
        <h2>校园万事屋</h2>
        <input id="login-u" class="in-field" maxlength="15" placeholder="你的昵称">
        <input id="login-p" class="in-field" type="password" placeholder="如果是管理员请输入密码">
        <button class="btn-blue" style="width:100%" onclick="doLogin()">进入万事屋</button>
    </div>
</div>

<div id="app-content" class="hidden">
    <div id="page-hub" class="page container active">
        <div class="card">
            <textarea id="post-txt" class="in-field" maxlength="500" style="height:90px; border:none; background:transparent;" placeholder="此刻你想说点什么？"></textarea>
            <div id="admin-tools" class="hidden">
                <div class="color-picker"><small>管理员专属颜色：</small>
                    <div class="dot active" style="background:#0984e3" onclick="selColor('blue', this)"></div>
                    <div class="dot" style="background:#00b894" onclick="selColor('green', this)"></div>
                    <div class="dot" style="background:#d63031" onclick="selColor('red', this)"></div>
                    <div class="dot" style="background:#e1b12c" onclick="selColor('gold', this)"></div>
                    <div class="dot" style="background:#2d3436" onclick="selColor('black', this)"></div>
                </div>
                <div style="margin-bottom:10px;"><input type="checkbox" id="chk-notice"> 置顶公告模式</div>
            </div>
            <div id="post-pre" class="hidden"><img id="pre-img" style="width:120px; border-radius:8px;"></div>
            <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid #f0f0f0; padding-top:10px;">
                <span onclick="document.getElementById('file-post').click()" style="font-size:24px; cursor:pointer;">📷</span>
                <input type="file" id="file-post" hidden onchange="uploadImg(this, 'post')">
                <button class="btn-blue" onclick="publish()">发布动态</button>
            </div>
        </div>
        <div id="feed"></div>
    </div>

    <div id="page-chat" class="page container">
        <h3>💬 对话列表</h3>
        <div id="chat-session-list" class="card" style="padding:0;">
            <div style="padding:20px; text-align:center; color:#999;">暂无消息记录</div>
        </div>
    </div>

    <div id="page-me" class="page container">
        <div class="card" style="text-align:center;">
            <img id="my-big-head" class="u-head" style="width:80px; height:80px; margin:0 auto 10px;">
            <h2 id="my-name"></h2>
            <div id="my-tag"></div>
            <button class="btn-blue" style="margin-top:15px; width:100%; background:#2d3436;" onclick="showUserMgr()">查看万事屋成员榜</button>
            <button onclick="logout()" style="margin-top:20px; display:block; width:100%; border:none; background:none; color:#999;">退出登录</button>
        </div>
        <div id="user-mgr-box" class="card hidden">
            <h4>注册成员 (上帝视角)</h4>
            <div id="user-list-content"></div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="switchPage('hub')"><span>🏛️</span>广场</div>
        <div class="tab-item" onclick="switchPage('chat')"><span>💬</span>私信<div id="msg-dot" class="badge hidden">0</div></div>
        <div class="tab-item" onclick="switchPage('me')"><span>👤</span>我</div>
    </div>
</div>

<div id="chat-window" class="hidden" style="position:fixed; top:0; left:0; right:0; bottom:0; background:#f0f2f5; z-index:3000; display:flex; flex-direction:column;">
    <div style="background:#fff; padding:15px; display:flex; align-items:center; border-bottom:1px solid #eee; padding-top: env(safe-area-inset-top);">
        <span onclick="closeChat()" style="font-size:22px; margin-right:15px; cursor:pointer;">✕</span>
        <b id="chat-target-name">正在聊天...</b>
    </div>
    <div id="chat-msgs" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:10px;"></div>
    <div style="padding:10px; background:#fff; display:flex; gap:10px; padding-bottom: env(safe-area-inset-bottom);">
        <input id="chat-input" class="in-field" style="margin:0" maxlength="500" placeholder="发送私信...">
        <button class="btn-blue" onclick="sendMsg()">发送</button>
    </div>
</div>

<script>
    const sb = supabase.createClient("https://ljopokentjagtxwdlzma.supabase.co", "sb_publishable_OgGGB2YH9O8rv0Vg3K8jEA_rbxA7ZHk");
    let me = null, tempPostImg = "", chatTarget = null, selectedColor = "blue";
    const ADMIN_NAME = "何梓晨", ADMIN_PASS = "hzc123456";

    window.onload = () => {
        const saved = localStorage.getItem('v19_full_pro');
        if(saved) { me = JSON.parse(saved); initApp(); }
    };

    async function doLogin() {
        const u = document.getElementById('login-u').value.trim();
        const p = document.getElementById('login-p').value.trim();
        if(!u) return alert("名字？");
        if(u === ADMIN_NAME && p !== ADMIN_PASS) return alert("密码不对！");
        me = { name: u, avatar: document.getElementById('a-img').src };
        await sb.from('profiles').upsert([{ username: u, avatar: me.avatar, last_login: new Date() }]);
        localStorage.setItem('v19_full_pro', JSON.stringify(me));
        initApp();
    }

    function initApp() {
        document.getElementById('page-auth').classList.add('hidden');
        document.getElementById('app-content').classList.remove('hidden');
        document.getElementById('my-name').innerText = me.name;
        document.getElementById('my-big-head').src = me.avatar || `https://api.dicebear.com/7.x/identicon/svg?seed=${me.name}`;
        if(me.name === ADMIN_NAME) {
            document.getElementById('admin-tools').classList.remove('hidden');
            document.getElementById('my-tag').innerHTML = '<span class="admin-tag color-blue">管理员</span>';
        }
        refreshAll();
        // 维持在线状态 & 轮询消息
        setInterval(() => { 
            if(me) sb.from('profiles').update({ last_login: new Date() }).eq('username', me.name);
            checkNewMessages();
        }, 10000);
    }

    // --- 核心：私信函数完全重写 ---
    async function loadChats() {
        const { data } = await sb.from('messages').select('*').or(`sender.eq."${me.name}",receiver.eq."${me.name}"`).order('id', {ascending:false});
        if(!data || data.length === 0) {
            document.getElementById('chat-session-list').innerHTML = `<div style="padding:20px; text-align:center; color:#999;">暂无消息记录</div>`;
            return;
        }
        const users = [...new Set(data.map(m => m.sender === me.name ? m.receiver : m.sender))];
        document.getElementById('chat-session-list').innerHTML = users.map(u => {
            const lastMsg = data.find(m => m.sender === u || m.receiver === u);
            return `
                <div class="user-row" onclick="openPrivateChat('${u}')" style="padding:15px; cursor:pointer; border-bottom:1px solid #f0f0f0;">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=${u}" style="width:40px;height:40px;border-radius:50%;margin-right:12px;">
                    <div style="flex:1">
                        <b>${u}</b>
                        <div style="font-size:12px;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${lastMsg.content}</div>
                    </div>
                </div>`;
        }).join('');
    }

    async function openPrivateChat(target) {
        if(target === me.name) return;
        chatTarget = target;
        document.getElementById('chat-target-name').innerText = "与 " + target + " 对话";
        document.getElementById('chat-window').classList.remove('hidden');
        // 标记消息已读
        await sb.from('messages').update({ is_read: true }).eq('receiver', me.name).eq('sender', target);
        loadPrivateMsgs();
    }

    async function loadPrivateMsgs() {
        if(!chatTarget) return;
        const { data } = await sb.from('messages').select('*').or(`and(sender.eq."${me.name}",receiver.eq."${chatTarget}"),and(sender.eq."${chatTarget}",receiver.eq."${me.name}")`).order('id', {ascending:true});
        document.getElementById('chat-msgs').innerHTML = (data || []).map(m => `<div class="msg-bubble ${m.sender === me.name ? 'msg-mine' : 'msg-other'}">${m.content}</div>`).join('');
        const b = document.getElementById('chat-msgs'); b.scrollTop = b.scrollHeight;
    }

    async function sendMsg() {
        if(await checkBanned()) return alert("禁言中");
        const c = document.getElementById('chat-input').value.trim();
        if(!c || !chatTarget) return;
        await sb.from('messages').insert([{ sender: me.name, receiver: chatTarget, content: c, is_read: false }]);
        document.getElementById('chat-input').value = "";
        loadPrivateMsgs();
    }

    async function checkNewMessages() {
        if(!me) return;
        const { data } = await sb.from('messages').select('id').eq('receiver', me.name).eq('is_read', false);
        const dot = document.getElementById('msg-dot');
        if(data?.length > 0) { dot.innerText = data.length; dot.classList.remove('hidden'); } else { dot.classList.add('hidden'); }
        if(!document.getElementById('chat-window').classList.contains('hidden')) loadPrivateMsgs();
    }

    function closeChat() { document.getElementById('chat-window').classList.add('hidden'); chatTarget = null; }

    // --- 广场/评论/点赞函数 ---
    async function publish() {
        if(await checkBanned()) return alert("禁言中");
        const txt = document.getElementById('post-txt').value.trim();
        const isNotice = document.getElementById('chk-notice').checked && me.name === ADMIN_NAME;
        const finalContent = me.name === ADMIN_NAME ? `[color:${selectedColor}]${txt}` : txt;
        await sb.from('posts').insert([{ username: me.name, content: finalContent, avatar: me.avatar, post_img: tempPostImg, is_notice: isNotice }]);
        document.getElementById('post-txt').value = ""; tempPostImg = "";
        document.getElementById('post-pre').classList.add('hidden');
        refreshAll();
    }

    async function refreshAll() {
        const { data: posts } = await sb.from('posts').select('*').order('is_notice', {ascending:false}).order('id', {ascending:false});
        const { data: cmts } = await sb.from('comments').select('*').order('id', {ascending:true});
        const myLikes = JSON.parse(localStorage.getItem('my_likes_v19') || "[]");

        document.getElementById('feed').innerHTML = (posts || []).map(p => {
            const pCmts = (cmts || []).filter(c => c.post_id === p.id);
            const isLiked = myLikes.includes(p.id);
            let displayTxt = p.content, colorClass = "";
            if(p.username === ADMIN_NAME && p.content.startsWith('[color:')) {
                const match = p.content.match(/\[color:(\w+)\](.*)/s);
                if(match) { colorClass = "color-" + match[1]; displayTxt = match[2]; }
            }

            return `
                <div class="card ${p.is_notice?'is-notice':''}">
                    <div class="u-info">
                        <img src="${p.avatar || 'https://api.dicebear.com/7.x/identicon/svg?seed='+p.username}" class="u-head">
                        <div style="flex:1"><b class="${colorClass}">${p.username}</b>${p.username===ADMIN_NAME?'<span class="admin-tag '+colorClass+'">管理员</span>':''}</div>
                        ${(p.username===me.name || me.name===ADMIN_NAME) ? `<span class="del-btn" onclick="delPost(${p.id})">删除</span>` : ''}
                    </div>
                    <div style="font-size:15px; white-space:pre-wrap;" class="${colorClass}">${displayTxt}</div>
                    ${p.post_img ? `<img src="${p.post_img}" style="width:100%; border-radius:10px; margin-top:10px;">` : ''}
                    <div class="action-bar">
                        <div onclick="doLike(${p.id}, ${p.likes})" style="cursor:pointer; ${isLiked?'color:#ff4757;font-weight:bold;':''}">❤️ ${p.likes || 0}</div>
                        <div onclick="openPrivateChat('${p.username}')" style="cursor:pointer; color:var(--primary);">📧 发私信</div>
                    </div>
                    <div class="cmt-area">
                        ${pCmts.map(c => {
                            let cTxt = c.content, cColor = "";
                            if(c.username === ADMIN_NAME && c.content.startsWith('[color:')) {
                                const m = c.content.match(/\[color:(\w+)\](.*)/s);
                                if(m) { cColor = "color-" + m[1]; cTxt = m[2]; }
                            }
                            return `<div style="margin:4px 0;"><b class="${cColor}">${c.username}</b>: <span class="${cColor}">${cTxt}</span></div>`;
                        }).join('')}
                        <div style="display:flex; gap:5px; margin-top:8px;">
                            <input id="cmt-in-${p.id}" class="in-field" style="margin:0; padding:6px; font-size:12px;" placeholder="回复...">
                            <button class="btn-blue" style="padding:4px 10px; font-size:11px;" onclick="doCmt(${p.id})">回复</button>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    // --- 工具类函数 ---
    async function doCmt(pid) {
        const val = document.getElementById('cmt-in-'+pid).value.trim();
        if(!val) return;
        const finalVal = me.name === ADMIN_NAME ? `[color:${selectedColor}]${val}` : val;
        await sb.from('comments').insert([{ post_id: pid, content: finalVal, username: me.name }]);
        refreshAll();
    }
    async function checkBanned() {
        const { data } = await sb.from('profiles').select('is_banned').eq('username', me.name).single();
        return data?.is_banned || false;
    }
    async function showUserMgr() {
        const box = document.getElementById('user-mgr-box'); box.classList.toggle('hidden');
        const { data } = await sb.from('profiles').select('*').order('last_login', {ascending:false});
        document.getElementById('user-list-content').innerHTML = (data || []).map(u => {
            const isOnline = (new Date() - new Date(u.last_login)) < 120000;
            return `<div class="user-row"><div class="status-dot ${isOnline?'online':''}" style="background:${isOnline?'':'#ccc'}"></div><b>${u.username}</b>
            <span style="flex:1;text-align:right;font-size:10px;color:#999">${isOnline?'在线':'离线'}</span>
            ${me.name===ADMIN_NAME ? `<button onclick="toggleBan('${u.username}',${u.is_banned})" style="margin-left:10px;font-size:10px;">${u.is_banned?'解禁':'禁言'}</button>`:''}</div>`;
        }).join('');
    }
    async function toggleBan(u, s) { await sb.from('profiles').update({is_banned:!s}).eq('username', u); showUserMgr(); }
    function selColor(color, el) {
        selectedColor = color;
        document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('post-txt').className = "in-field color-" + color;
    }
    function switchPage(p) {
        document.querySelectorAll('.page').forEach(e => e.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(e => e.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        event.currentTarget.classList.add('active');
        if(p === 'chat') loadChats();
    }
    function uploadImg(input, mode) {
        if (!input.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image(); img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const maxW = mode === 'me' ? 120 : 600;
                canvas.width = maxW; canvas.height = img.height * (maxW/img.width);
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                const b64 = canvas.toDataURL('image/jpeg', 0.5);
                if(mode === 'me') { document.getElementById('a-img').src = b64; document.getElementById('a-img').classList.remove('hidden'); document.getElementById('a-plus').classList.add('hidden'); }
                else { tempPostImg = b64; document.getElementById('pre-img').src = b64; document.getElementById('post-pre').classList.remove('hidden'); }
            };
        };
        reader.readAsDataURL(input.files[0]);
    }
    async function doLike(pid, curLikes) {
        let myLikes = JSON.parse(localStorage.getItem('my_likes_v19') || "[]");
        const idx = myLikes.indexOf(pid);
        let newCount = (idx === -1) ? (curLikes + 1) : Math.max(0, curLikes - 1);
        idx === -1 ? myLikes.push(pid) : myLikes.splice(idx, 1);
        localStorage.setItem('my_likes_v19', JSON.stringify(myLikes));
        await sb.from('posts').update({ likes: newCount }).eq('id', pid); refreshAll();
    }
    async function delPost(id) { if(confirm("删除动态？")) { await sb.from('posts').delete().eq('id', id); refreshAll(); } }
    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
