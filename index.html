<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校园表白墙</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:#eef3fb;
}

/* 顶部 */
.header{
  background:linear-gradient(135deg,#4da3ff,#6fc3ff);
  color:white;
  padding:18px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

/* 容器 */
.container{
  max-width:600px;
  margin:auto;
  padding:15px;
}

/* 卡片 */
.card{
  background:white;
  border-radius:14px;
  padding:15px;
  margin-top:12px;
  box-shadow:0 3px 10px rgba(0,0,0,0.06);
}

/* 输入 */
input,textarea{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #e3e8f0;
  background:#f9fbff;
}

/* 按钮 */
button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#4da3ff;
  color:white;
  font-weight:bold;
  transition:0.2s;
}

button:active{
  transform:scale(0.97);
}

/* 用户名 */
.name{
  font-weight:bold;
  color:#333;
}

/* 内容 */
.content{
  margin:6px 0;
  font-size:15px;
}

/* 操作栏 */
.actions{
  display:flex;
  gap:15px;
  font-size:14px;
  margin-top:5px;
}

.action{
  color:#4da3ff;
  cursor:pointer;
}

/* 评论 */
.comment{
  background:#f4f7fc;
  padding:6px 10px;
  margin-top:6px;
  border-radius:8px;
  font-size:13px;
}
</style>
</head>

<body>

<div class="header">💙 校园表白墙</div>

<div class="container">

<!-- 登录 -->
<div id="auth" class="card">
<input id="email" placeholder="邮箱">
<input id="password" type="password" placeholder="密码">
<input id="username" placeholder="昵称">
<button onclick="login()">登录 / 注册</button>
</div>

<!-- 主界面 -->
<div id="app" style="display:none;">

<div class="card">
<textarea id="content" placeholder="说点什么吧..."></textarea>
<button onclick="addPost()">发布</button>
</div>

<div id="posts"></div>

</div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://ljopokentjagtxwdlzma.supabase.co",
  "sb_publishable_OgGGB2YH9O8rv0Vg3K8jEA_rbxA7ZHk"
);

const ADMIN_ID = "";

let currentUser = null;
let currentName = "";

// 登录
async function login(){
  let email = emailInput.value;
  let password = passwordInput.value;
  let username = usernameInput.value;

  let { error } = await supabaseClient.auth.signInWithPassword({email,password});

  if(error){
    await supabaseClient.auth.signUp({email,password});
    await supabaseClient.auth.signInWithPassword({email,password});
  }

  currentName = username;
  checkUser();
}

// 检查用户
async function checkUser(){
  let { data } = await supabaseClient.auth.getUser();
  if(data.user){
    currentUser = data.user.id;
    auth.style.display="none";
    app.style.display="block";
    loadPosts();
  }
}

// 发帖
async function addPost(){
  let text = content.value;
  if(!text) return alert("不能为空");

  await supabaseClient.from("posts").insert([{
    content:text,
    user_id:currentUser,
    username:currentName
  }]);

  content.value="";
  loadPosts();
}

// 点赞
async function likePost(id,likes){
  await supabaseClient.from("posts")
    .update({likes:likes+1})
    .eq("id",id);
  loadPosts();
}

// 删除
async function deletePost(id){
  await supabaseClient.from("posts").delete().eq("id",id);
  loadPosts();
}

// 评论
async function addComment(post_id){
  let text = prompt("评论：");
  if(!text) return;

  await supabaseClient.from("comments").insert([{
    post_id,
    content:text,
    username:currentName
  }]);

  loadPosts();
}

// 加载
async function loadPosts(){
  let { data:posts } = await supabaseClient.from("posts")
    .select("*").order("id",{ascending:false});

  let { data:comments } = await supabaseClient.from("comments").select("*");

  let html="";

  posts.forEach(p=>{
    let cs = comments.filter(c=>c.post_id===p.id);

    let canDelete = currentUser===ADMIN_ID || currentUser===p.user_id;

    html+=`
    <div class="card">
      <div class="name">${p.username}</div>
      <div class="content">${p.content}</div>
      <div class="actions">
        <span class="action" onclick="likePost(${p.id},${p.likes})">❤️ ${p.likes}</span>
        <span class="action" onclick="addComment(${p.id})">💬 评论</span>
        ${canDelete ? `<span class="action" onclick="deletePost(${p.id})">🗑 删除</span>` : ""}
      </div>
      ${cs.map(c=>`<div class="comment">${c.username}: ${c.content}</div>`).join("")}
    </div>`;
  });

  document.getElementById("posts").innerHTML = html;
}

checkUser();
</script>

</body>
</html>
