<!DOCTYPE html><html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三高表白墙·旗舰版</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script><style>
:root{
--primary:#0984e3;
--bg:#f4f7f6;
--radius:22px;
--danger:#e74c3c;
--gold:#f1c40f;
--shadow:0 10px 25px rgba(0,0,0,.08);
}
body{margin:0;background:var(--bg);font-family:-apple-system;}
.container{max-width:600px;margin:auto;padding:12px;display:none;}
.container.active{display:block;}
.card{background:#fff;border-radius:var(--radius);padding:18px;margin-bottom:12px;box-shadow:var(--shadow);transition:.2s;}
.card:active{transform:scale(.98);}

.tab-bar{position:fixed;bottom:0;left:0;right:0;height:70px;background:#fff;display:flex;border-top:1px solid #eee;}
.tab-item{flex:1;text-align:center;padding-top:8px;color:#aaa;cursor:pointer;}
.tab-item.active{color:var(--primary);font-weight:bold;}

.btn{background:linear-gradient(135deg,#0984e3,#74b9ff);color:#fff;border:none;padding:10px 20px;border-radius:15px;}
.input{width:100%;padding:12px;border-radius:15px;border:1px solid #eee;margin-top:10px;}

.red-dot{position:absolute;background:red;color:#fff;font-size:10px;border-radius:50%;padding:2px 6px;}
.notice{background:#fff8e1;border:2px solid var(--gold);}
</style></head><body><div id="login" class="container active">
<div class="card" style="text-align:center;padding:40px;">
<h2>三高表白墙</h2>
<input id="name" class="input" placeholder="昵称">
<input id="pw" class="input" placeholder="管理员密码(可选)">
<button class="btn" style="width:100%;margin-top:15px;" onclick="login()">进入</button>
</div>
</div><div id="app" style="display:none;"><div id="wall" class="container active">
<div class="card">
<textarea id="post" class="input" placeholder="说点什么..." style="height:80px;"></textarea>
<button class="btn" onclick="sendPost()">发布</button>
</div>
<div id="list"></div>
</div><div id="msg" class="container">
<div class="card">
<b>🔔 消息专区</b>
<div id="noticeBox"></div>
</div>
<div id="session"></div>
</div><div id="me" class="container">
<div class="card">
<h3 id="meName"></h3>
<button class="btn" onclick="logout()">退出</button>
</div>
</div><div class="tab-bar">
<div class="tab-item active" onclick="switchTab('wall',this)">广场</div>
<div class="tab-item" onclick="switchTab('msg',this)">私信</div>
<div class="tab-item" onclick="switchTab('me',this)">我的</div>
</div></div><script>
const supa=supabase.createClient("https://ljopokentjagtxwdlzma.supabase.co","sb_publishable_OgGGB2YH9O8rv0Vg3K8jEA_rbxA7ZHk");

let me=null;
const ADMIN="HeAI（作者）";
const PASS="hzc123456";

/* 登录 */
async function login(){
let name=document.getElementById('name').value.trim();
let pw=document.getElementById('pw').value.trim();
if(!name)return alert("输入昵称");

me={name,isAdmin:(name===ADMIN&&pw===PASS)};
localStorage.setItem("user",JSON.stringify(me));

start();
}

/* 启动 */
function start(){
document.getElementById('login').style.display="none";
document.getElementById('app').style.display="block";
document.getElementById('meName').innerText=me.name;

renderWallSafe();
loadNotice();
}

/* 切换 */
function switchTab(id,el){
document.querySelectorAll('.container').forEach(x=>x.classList.remove('active'));
document.querySelectorAll('.tab-item').forEach(x=>x.classList.remove('active'));
document.getElementById(id).classList.add('active');
el.classList.add('active');

if(id==="msg"){loadNotice();}
}

/* 发帖 */
async function sendPost(){
let txt=document.getElementById('post').value.trim();
if(!txt)return;

await supa.from('posts').insert([{username:me.name,content:txt}]);
document.getElementById('post').value="";
renderWallSafe();
}

/* 防卡渲染 */
let lock=false;
async function renderWallSafe(){
if(lock)return;
lock=true;
await renderWall();
setTimeout(()=>lock=false,500);
}

/* 渲染 */
async function renderWall(){
let {data:posts}=await supa.from('posts').select('*').order('id',{ascending:false});
let {data:cmts}=await supa.from('comments').select('*');

let map={};
cmts.forEach(c=>{
if(!map[c.post_id])map[c.post_id]=[];
map[c.post_id].push(c);
});

let html="";
posts.forEach(p=>{
let list=map[p.id]||[];

html+=`
<div class="card" data-id="${p.id}">
<b>${p.username}</b>
<div>${p.content}</div>

<div>
${list.map(c=>`
<div><b>${c.username}</b>:${c.content}</div>
`).join("")}
</div>

<input id="c${p.id}" class="input" placeholder="评论">
<button class="btn" onclick="sendCmt(${p.id})">发</button>
</div>
`;
});
document.getElementById('list').innerHTML=html;
}

/* 评论+通知 */
async function sendCmt(pid){
let val=document.getElementById('c'+pid).value.trim();
if(!val)return;

let {data:post}=await supa.from('posts').select('username').eq('id',pid).single();

await supa.from('comments').insert([{post_id:pid,username:me.name,content:val}]);

if(post.username!==me.name){
await supa.from('notice').insert([{
receiver:post.username,
sender:me.name,
content:val,
post_id:pid,
is_read:false
}]);
}

renderWallSafe();
}

/* 通知 */
async function loadNotice(){
let {data}=await supa.from('notice').select('*').eq('receiver',me.name).order('id',{ascending:false});

let html="";
(data||[]).forEach(n=>{
html+=`
<div onclick="jump(${n.post_id})" style="padding:8px;background:${n.is_read?'#fff':'#eaf4ff'};margin:5px 0;border-radius:10px;">
<b>${n.sender}</b> 回复你：${n.content}
</div>
`;
});
document.getElementById('noticeBox').innerHTML=html||"暂无消息";
}

/* 跳转 */
async function jump(pid){
await supa.from('notice').update({is_read:true}).eq('post_id',pid);
switchTab('wall',document.querySelectorAll('.tab-item')[0]);

setTimeout(()=>{
let el=document.querySelector('[data-id="'+pid+'"]');
if(el)el.scrollIntoView({behavior:'smooth'});
},300);
}

/* 退出 */
function logout(){
localStorage.clear();
location.reload();
}

/* 自动登录 */
let saved=localStorage.getItem("user");
if(saved){me=JSON.parse(saved);start();}
</script></body>
</html>
