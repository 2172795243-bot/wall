<script>
/* ===============================
   原配置
=============================== */
const API_URL = "https://ljopokentjagtxwdlzma.supabase.co";
const API_KEY = "sb_publishable_OgGGB2YH9O8rv0Vg3K8jEA_rbxA7ZHk";
const sango = supabase.createClient(API_URL, API_KEY);

let me = null;
let cachedB64 = "";
let curPartner = null;
let curColor = "blue";

/* ===============================
   ⭐⭐⭐ 多管理员系统（核心升级）⭐⭐⭐
=============================== */
const ADMINS = [
    { name: "HeAI（作者）", pass: "hzc123456" },
    { name: "何梓晨", pass: "hzc123456" },
    { name: "Admin2", pass: "123456" }
];

// 判断是不是管理员
function isAdminUser(name){
    return ADMINS.some(a => a.name === name);
}

// 获取管理员
function getAdmin(name){
    return ADMINS.find(a => a.name === name);
}

/* ===============================
   初始化
=============================== */
window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('SANGO_USER_V27');
    if (saved) {
        me = JSON.parse(saved);
        launchApp();
    }
});

/* ===============================
   ⭐ 登录（已改）
=============================== */
async function handleLogin() {
    const name = document.getElementById('in-nickname').value.trim();
    const pass = document.getElementById('in-admin-pw').value.trim();

    if (!name) return alert("校友，请输入昵称！");

    const admin = getAdmin(name);
    if (admin && pass !== admin.pass) {
        return alert("管理员密令核验失败！");
    }

    const { data: profile } = await sango.from('profiles').select('*').eq('username', name).single();
    if (profile && profile.is_banned) return alert("该校友已被管理员封禁，无法进入！");

    me = {
        name: name,
        avatar: document.getElementById('img-avatar-pre').src || `https://api.dicebear.com/7.x/identicon/svg?seed=${name}`,
        isAdmin: !!admin
    };

    await sango.from('profiles').upsert([{ username: name, avatar: me.avatar }]);

    localStorage.setItem('SANGO_USER_V27', JSON.stringify(me));
    launchApp();
}

/* ===============================
   启动
=============================== */
function launchApp() {
    document.getElementById('page-login').style.display = 'none';
    document.getElementById('app-body').classList.remove('hidden');

    document.getElementById('profile-name').innerText = me.name;

    if (me.isAdmin) {
        document.getElementById('admin-post-tools').classList.remove('hidden');
        document.getElementById('btn-admin-mgr').classList.remove('hidden');
        document.getElementById('profile-badge').innerHTML = '<span class="notice-label">官方管理员</span>';
    }

    renderWall();
    syncData();
}

/* ===============================
   ⭐ 墙（已改管理员判断）
=============================== */
async function renderWall() {
    const { data: posts } = await sango.from('posts').select('*').order('id', {ascending:false});

    let html = "";
    (posts || []).forEach(p => {

        html += `
        <div class="card">
            <b>${p.username}</b>
            ${isAdminUser(p.username) ? '<span class="admin-tag">管理员</span>' : ''}
            ${(p.username === me.name || me.isAdmin) ? `<span onclick="killPost(${p.id})">删除</span>` : ''}
            <div>${p.content}</div>
        </div>`;
    });

    document.getElementById('wall-stream').innerHTML = html;
}

/* ===============================
   ⭐ 管理员保护（关键）
=============================== */
async function toggleBanStatus(username, current) {
    if (isAdminUser(username)) {
        return alert("管理员不可被禁言");
    }

    await sango.from('profiles').update({ is_banned: !current }).eq('username', username);
}

/* ===============================
   其它逻辑（原样保留）
=============================== */

async function killPost(id) {
    if(confirm("删除这条动态？")) {
        await sango.from('posts').delete().eq('id', id);
        renderWall();
    }
}

async function submitToWall() {
    const text = document.getElementById('post-text').value.trim();
    if (!text) return;

    await sango.from('posts').insert([
        { username: me.name, content: text, avatar: me.avatar }
    ]);

    document.getElementById('post-text').value = "";
    renderWall();
}

function syncData(){
    sango.channel('all')
    .on('postgres_changes',{event:'*',schema:'public',table:'posts'},()=>renderWall())
    .subscribe();
}
</script>

</body>
