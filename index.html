<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>校园万事屋 | 终极上帝版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root { --primary: #0984e3; --admin-color: #d63031; --bg: #f0f2f5; --radius: 16px; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); padding-bottom: 80px; }
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: #fff; display: flex; border-top: 1px solid #eee; z-index: 2000; padding-bottom: env(safe-area-inset-bottom); }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; color: #636e72; cursor: pointer; position: relative; }
        .tab-item.active { color: var(--primary); font-weight: bold; }
        .badge { position: absolute; top: 8px; right: 25%; background: #ff4757; color: white; border-radius: 10px; min-width: 16px; height: 16px; font-size: 10px; display: flex; align-items: center; justify-content: center; padding: 0 4px; border: 2px solid #fff; }
        .container { max-width: 580px; margin: 0 auto; padding: 15px; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; border-radius: var(--radius); padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); position: relative; }
        .is-notice { border: 2px solid #fab005; background: #fffbe6 !important; }
        .u-info { display: flex; align-items: center; margin-bottom: 10px; }
        .u-head { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; margin-right: 12px; background: #eee; border: 1px solid #eee; }
        .admin-tag { color: var(--admin-color); font-weight: bold; font-size: 10px; border: 1px solid var(--admin-color); padding: 0 4px; border-radius: 4px; margin-left: 5px; }
        .action-bar { display: flex; gap: 20px; margin-top: 12px; padding-top: 10px; border-top: 1px solid #f0f0f0; font-size: 13px; }
        .action-item { cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .cmt-area { background: #f8fafc; border-radius: 10px; padding: 10px; margin-top: 10px; font-size: 13px; }
        .cmt-item { padding: 5px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .in-field { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; outline: none; }
        .btn-blue { background: var(--primary); color: white; border: none; padding: 8px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .del-btn { color: #ff7675; cursor: pointer; font-size: 12px; }
        .hidden { display: none !important; }
        
        /* 管理员名单样式 */
        .user-row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .user-row:last-child { border: none; }
        .ban-status { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 10px; }
    </style>
</head>
<body>

<div id="page-auth" class="container" style="margin-top: 50px;">
    <div class="card" style="text-align:center; padding:30px;">
        <div id="avatar-box" style="width:85px;height:85px;border-radius:50%;background:#f0f2f5;margin:0 auto 15px;overflow:hidden;border:2px dashed #ccc;display:flex;align-items:center;justify-content:center;cursor:pointer;" onclick="document.getElementById('file-avatar').click()">
            <span id="a-plus" style="font-size:30px;color:#999">+</span><img id="a-img" class="hidden" style="width:100%;height:100%;object-fit:cover;">
        </div>
        <input type="file" id="file-avatar" hidden accept="image/*" onchange="uploadImg(this, 'me')">
        <h2>校园万事屋</h2>
        <input id="login-u" class="in-field" maxlength="15" placeholder="输入昵称">
        <input id="login-p" class="in-field" type="password" placeholder="输入密码">
        <button class="btn-blue" style="width:100%" onclick="doLogin()">登录/注册</button>
    </div>
</div>

<div id="app-content" class="hidden">
    <div id="page-hub" class="page container active">
        <div class="card">
            <textarea id="post-txt" class="in-field" maxlength="500" style="height:90px; border:none; background:transparent;" placeholder="此刻在想什么？(限500字)"></textarea>
            <div id="post-pre" class="hidden"><img id="pre-img" style="width:120px; border-radius:8px;"></div>
            <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid #f0f0f0; padding-top:10px;">
                <span onclick="document.getElementById('file-post').click()" style="font-size:24px; cursor:pointer;">📷</span>
                <input type="file" id="file-post" hidden onchange="uploadImg(this, 'post')">
                <div id="adm-box" class="hidden"><input type="checkbox" id="chk-notice"> 置顶</div>
                <button class="btn-blue" onclick="publish()">发布</button>
            </div>
        </div>
        <div id="feed"></div>
    </div>

    <div id="page-chat" class="page container">
        <h3>私信列表</h3>
        <div id="chat-session-list"></div>
    </div>

    <div id="page-me" class="page container">
        <div class="card" style="text-align:center;">
            <img id="my-big-head" class="u-head" style="width:80px; height:80px; margin:0 auto 10px;">
            <h2 id="my-name"></h2>
            <div id="my-tag"></div>
            <button class="btn-blue" id="btn-mgr" style="margin-top:15px; background:#636e72;" onclick="showUserMgr()">用户管理 (上帝视角)</button>
            <button onclick="logout()" style="margin-top:20px; display:block; width:100%; border:none; background:none; color:#999;">退出登录</button>
        </div>
        <div id="user-mgr-box" class="card hidden">
            <h4>所有登录过的用户</h4>
            <div id="user-list-content">加载中...</div>
        </div>
        <div id="my-feed"></div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="switchPage('hub')"><span>🏛️</span>广场</div>
        <div class="tab-item" onclick="switchPage('chat')"><span>💬</span>私信<div id="msg-dot" class="badge hidden">0</div></div>
        <div class="tab-item" onclick="switchPage('me')"><span>👤</span>我</div>
    </div>
</div>

<div id="chat-window" class="hidden" style="position:fixed; top:0; left:0; right:0; bottom:0; background:#f0f2f5; z-index:3000; display:flex; flex-direction:column;">
    <div style="background:#fff; padding:15px; display:flex; align-items:center; border-bottom:1px solid #eee; padding-top: env(safe-area-inset-top);">
        <span onclick="closeChat()" style="font-size:22px; margin-right:15px;">✕</span>
        <b id="chat-target-name">聊天</b>
    </div>
    <div id="chat-msgs" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:10px;"></div>
    <div style="padding:10px; background:#fff; display:flex; gap:10px; padding-bottom: env(safe-area-inset-bottom);">
        <input id="chat-input" class="in-field" maxlength="500" placeholder="发送私信...">
        <button class="btn-blue" onclick="sendMsg()">发送</button>
    </div>
</div>

<script>
    const sb = supabase.createClient("https://ljopokentjagtxwdlzma.supabase.co", "sb_publishable_OgGGB2YH9O8rv0Vg3K8jEA_rbxA7ZHk");
    let me = null, tempPostImg = "", chatTarget = null, lastPostTime = 0;
    const ADMIN_NAME = "何梓晨", ADMIN_PASS = "hzc123456";

    window.onload = () => {
        const saved = localStorage.getItem('v15_god_mode');
        if(saved) { me = JSON.parse(saved); initApp(); }
    };

    async function doLogin() {
        const u = document.getElementById('login-u').value.trim();
        const p = document.getElementById('login-p').value.trim();
        if(!u) return alert("写个名字吧");
        if(u === ADMIN_NAME && p !== ADMIN_PASS) return alert("管理员密码不对哦！");
        
        me = { name: u, avatar: document.getElementById('a-img').src };
        // 登录时同步到 profiles 表
        await sb.from('profiles').upsert([{ username: u, avatar: me.avatar, last_login: new Date() }]);
        
        localStorage.setItem('v15_god_mode', JSON.stringify(me));
        initApp();
    }

    function initApp() {
        document.getElementById('page-auth').classList.add('hidden');
        document.getElementById('app-content').classList.remove('hidden');
        document.getElementById('my-name').innerText = me.name;
        document.getElementById('my-big-head').src = me.avatar || `https://api.dicebear.com/7.x/identicon/svg?seed=${me.name}`;
        if(me.name === ADMIN_NAME) {
            document.getElementById('adm-box').classList.remove('hidden');
            document.getElementById('btn-mgr').classList.remove('hidden');
            document.getElementById('my-tag').innerHTML = '<span class="admin-tag">总管理员</span>';
        } else {
            document.getElementById('btn-mgr').classList.add('hidden');
        }
        refreshAll();
        setInterval(checkNewMessages, 5000);
    }

    async function showUserMgr() {
        const box = document.getElementById('user-mgr-box');
        box.classList.toggle('hidden');
        if(box.classList.contains('hidden')) return;
        
        const { data } = await sb.from('profiles').select('*').order('last_login', {ascending:false});
        document.getElementById('user-list-content').innerHTML = (data || []).map(u => `
            <div class="user-row">
                <img src="${u.avatar || 'https://api.dicebear.com/7.x/identicon/svg?seed='+u.username}" style="width:30px;height:30px;border-radius:50%;margin-right:10px;">
                <div style="flex:1">
                    <b>${u.username}</b>
                    <span class="ban-status" style="background:${u.is_banned?'#ff7675':'#55efc4'}">${u.is_banned?'已禁言':'正常'}</span>
                </div>
                <button onclick="toggleBan('${u.username}', ${u.is_banned})" style="font-size:11px;">${u.is_banned?'解禁':'禁言'}</button>
            </div>
        `).join('');
    }

    async function toggleBan(target, currentStatus) {
        if(target === ADMIN_NAME) return alert("不能禁言你自己！");
        await sb.from('profiles').update({ is_banned: !currentStatus }).eq('username', target);
        showUserMgr();
    }

    async function checkBanned() {
        const { data } = await sb.from('profiles').select('is_banned').eq('username', me.name).single();
        return data?.is_banned || false;
    }

    async function publish() {
        if(await checkBanned()) return alert("你已被禁言，无法发布动态。");
        const now = Date.now();
        if(me.name !== ADMIN_NAME && (now - lastPostTime < 300000)) return alert("5分钟限时：请休息一会儿再发~");
        
        const txt = document.getElementById('post-txt').value.trim();
        if(!txt && !tempPostImg) return;
        const isNotice = document.getElementById('chk-notice').checked && me.name === ADMIN_NAME;
        await sb.from('posts').insert([{ username: me.name, content: txt, avatar: me.avatar, post_img: tempPostImg, is_notice: isNotice, likes: 0 }]);
        document.getElementById('post-txt').value = ""; tempPostImg = "";
        document.getElementById('post-pre').classList.add('hidden');
        lastPostTime = now; refreshAll();
    }

    async function doCmt(pid) {
        if(await checkBanned()) return alert("你已被禁言，无法评论。");
        const val = document.getElementById('cmt-in-'+pid).value.trim();
        if(!val) return;
        await sb.from('comments').insert([{ post_id: pid, content: val, username: me.name }]);
        refreshAll();
    }

    async function refreshAll() {
        const { data: posts } = await sb.from('posts').select('*').order('is_notice', {ascending:false}).order('id', {ascending:false});
        const { data: cmts } = await sb.from('comments').select('*').order('id', {ascending:true});
        const myLikes = JSON.parse(localStorage.getItem('my_likes_v15') || "[]");
        const isAdmin = me.name === ADMIN_NAME;

        document.getElementById('feed').innerHTML = (posts || []).map(p => {
            const pCmts = (cmts || []).filter(c => c.post_id === p.id);
            const isLiked = myLikes.includes(p.id);
            return `
                <div class="card ${p.is_notice?'is-notice':''}">
                    <div class="u-info">
                        <img src="${p.avatar || 'https://api.dicebear.com/7.x/identicon/svg?seed='+p.username}" class="u-head">
                        <div style="flex:1"><b>${p.username}</b>${p.username===ADMIN_NAME?'<span class="admin-tag">管理员</span>':''}</div>
                        ${(p.username===me.name || isAdmin) ? `<span class="del-btn" onclick="delPost(${p.id})">删除</span>` : ''}
                    </div>
                    <div style="font-size:15px; white-space:pre-wrap;">${p.content}</div>
                    ${p.post_img ? `<img src="${p.post_img}" style="width:100%; border-radius:10px; margin-top:10px;">` : ''}
                    <div class="action-bar">
                        <div onclick="doLike(${p.id}, ${p.likes})" style="cursor:pointer; ${isLiked?'color:#ff4757;font-weight:bold;':''}">
                            ${isLiked?'❤️':'🖤'} ${p.likes || 0}
                        </div>
                        <div onclick="document.getElementById('cmt-in-${p.id}').focus()" style="cursor:pointer;">💬 ${pCmts.length}</div>
                        <div onclick="openPrivateChat('${p.username}')" style="cursor:pointer; color:var(--primary);">📧 私信</div>
                    </div>
                    <div class="cmt-area">
                        ${pCmts.map((c, i) => `
                            <div class="cmt-item ${i < pCmts.length - 1 ? 'old-cmt-'+p.id+' hidden' : ''}">
                                <span><b>${c.username}</b>: ${c.content}</span>
                                ${(c.username===me.name || isAdmin) ? `<span class="del-btn" onclick="delCmt(${c.id})">×</span>` : ''}
                            </div>
                        `).join('')}
                        ${pCmts.length > 1 ? `<div id="exp-${p.id}" style="color:var(--primary);text-align:center;padding:5px;cursor:pointer;" onclick="this.classList.add('hidden');document.querySelectorAll('.old-cmt-${p.id}').forEach(e=>e.classList.remove('hidden'))">展开全部评论 ↓</div>` : ''}
                        <div style="margin-top:8px; display:flex; gap:5px;">
                            <input id="cmt-in-${p.id}" maxlength="500" class="in-field" style="margin:0; padding:6px; font-size:12px;" placeholder="我也说两句...">
                            <button class="btn-blue" style="padding:4px 12px; font-size:12px;" onclick="doCmt(${p.id})">回帖</button>
                        </div>
                    </div>
                </div>`;
        }).join('') || "正在连接宇宙中...";
    }

    async function doLike(pid, curLikes) {
        let myLikes = JSON.parse(localStorage.getItem('my_likes_v15') || "[]");
        const idx = myLikes.indexOf(pid);
        let newCount = curLikes || 0;
        if(idx === -1) { newCount++; myLikes.push(pid); } 
        else { newCount = Math.max(0, newCount - 1); myLikes.splice(idx, 1); }
        localStorage.setItem('my_likes_v15', JSON.stringify(myLikes));
        await sb.from('posts').update({ likes: newCount }).eq('id', pid);
        refreshAll();
    }

    async function checkNewMessages() {
        if(!me) return;
        const { data } = await sb.from('messages').select('id').eq('receiver', me.name).eq('is_read', false);
        const dot = document.getElementById('msg-dot');
        if(data && data.length > 0) { dot.innerText = data.length; dot.classList.remove('hidden'); } 
        else { dot.classList.add('hidden'); }
        if(chatTarget) loadPrivateMsgs();
    }

    async function openPrivateChat(target) {
        if(target === me.name) return;
        chatTarget = target;
        document.getElementById('chat-target-name').innerText = "与 " + target + " 对话";
        document.getElementById('chat-window').classList.remove('hidden');
        await sb.from('messages').update({ is_read: true }).eq('receiver', me.name).eq('sender', target);
        loadPrivateMsgs();
    }

    async function loadPrivateMsgs() {
        const { data } = await sb.from('messages').select('*').or(`and(sender.eq."${me.name}",receiver.eq."${chatTarget}"),and(sender.eq."${chatTarget}",receiver.eq."${me.name}")`).order('id', {ascending:true});
        document.getElementById('chat-msgs').innerHTML = (data || []).map(m => `<div class="msg-bubble ${m.sender === me.name ? 'msg-mine' : 'msg-other'}">${m.content}</div>`).join('');
        const box = document.getElementById('chat-msgs'); box.scrollTop = box.scrollHeight;
    }

    async function sendMsg() {
        if(await checkBanned()) return alert("禁言中，无法发送私信。");
        const c = document.getElementById('chat-input').value.trim();
        if(!c) return;
        await sb.from('messages').insert([{ sender: me.name, receiver: chatTarget, content: c, is_read: false }]);
        document.getElementById('chat-input').value = ""; loadPrivateMsgs();
    }

    async function loadChats() {
        const { data } = await sb.from('messages').select('*').or(`sender.eq."${me.name}",receiver.eq."${me.name}"`).order('id', {ascending:false});
        const users = [...new Set((data || []).map(m => m.sender === me.name ? m.receiver : m.sender))];
        document.getElementById('chat-session-list').innerHTML = users.map(u => `<div class="card" onclick="openPrivateChat('${u}')"><b>${u}</b> 的对话</div>`).join('') || "暂无消息";
    }

    function switchPage(p) {
        document.querySelectorAll('.page').forEach(e => e.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(e => e.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        event.currentTarget.classList.add('active');
        refreshAll();
    }

    function uploadImg(input, mode) {
        if (!input.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const maxW = mode === 'me' ? 120 : 600;
                canvas.width = maxW; canvas.height = img.height * (maxW/img.width);
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                const b64 = canvas.toDataURL('image/jpeg', 0.5);
                if(mode === 'me') { document.getElementById('a-img').src = b64; document.getElementById('a-img').classList.remove('hidden'); document.getElementById('a-plus').classList.add('hidden'); }
                else { tempPostImg = b64; document.getElementById('pre-img').src = b64; document.getElementById('post-pre').classList.remove('hidden'); }
            };
        };
        reader.readAsDataURL(input.files[0]);
    }

    async function delPost(id) { if(confirm("删除这条动态？")) { await sb.from('posts').delete().eq('id', id); refreshAll(); } }
    async function delCmt(id) { if(confirm("删除评论？")) { await sb.from('comments').delete().eq('id', id); refreshAll(); } }
    function closeChat() { document.getElementById('chat-window').classList.add('hidden'); chatTarget = null; }
    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
