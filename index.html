<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>校园万事屋 Pro | 修正版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root { --primary: #0984e3; --admin-color: #d63031; --bg: #f0f2f5; --radius: 16px; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); padding-bottom: 70px; }
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: #fff; display: flex; border-top: 1px solid #eee; z-index: 2000; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; color: #636e72; cursor: pointer; }
        .tab-item.active { color: var(--primary); font-weight: bold; }
        .container { max-width: 580px; margin: 0 auto; padding: 15px; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; border-radius: var(--radius); padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .u-head { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; margin-right: 12px; background: #eee; border: 1px solid #f0f0f0; }
        .u-info { display: flex; align-items: center; margin-bottom: 10px; }
        .msg-bubble { padding: 10px 15px; border-radius: 15px; margin-bottom: 10px; max-width: 80%; }
        .msg-mine { background: var(--primary); color: #fff; align-self: flex-end; margin-left: auto; }
        .msg-other { background: #e4e6eb; color: #000; }
        .btn-blue { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .in-field { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .hidden { display: none !important; }
        .admin-tag { color: var(--admin-color); font-weight: bold; font-size: 11px; border: 1px solid var(--admin-color); padding: 0 4px; border-radius: 4px; margin-left: 5px; }
    </style>
</head>
<body>

<div id="page-auth" class="container" style="margin-top: 50px;">
    <div class="card" style="text-align:center; padding:30px;">
        <div id="avatar-box" style="width:80px;height:80px;border-radius:50%;background:#f0f2f5;margin:0 auto 15px;overflow:hidden;border:2px dashed #ccc;display:flex;align-items:center;justify-content:center;cursor:pointer;" onclick="document.getElementById('file-avatar').click()">
            <span id="a-plus">+</span><img id="a-img" class="hidden" style="width:100%;height:100%;object-fit:cover;">
        </div>
        <input type="file" id="file-avatar" hidden accept="image/*" onchange="uploadImg(this, 'me')">
        <h3>开启你的校园社交</h3>
        <input id="login-u" class="in-field" placeholder="设置昵称">
        <input id="login-p" class="in-field" type="password" placeholder="设置密码">
        <button class="btn-blue" style="width:100%" onclick="doLogin()">进入万事屋</button>
    </div>
</div>

<div id="app-content" class="hidden">
    <div id="page-chat" class="page container">
        <h2 style="margin-bottom:15px;">消息</h2>
        <div id="chat-session-list">加载中...</div>
    </div>

    <div id="page-hub" class="page container active">
        <div class="card">
            <textarea id="post-txt" class="in-field" style="height:80px; border:none; background:#f8fafc;" placeholder="发条图文动态吧..."></textarea>
            <div id="post-pre" class="hidden"><img id="pre-img" style="width:100px; border-radius:8px; margin-top:10px;"></div>
            <div style="display:flex; justify-content:space-between; margin-top:10px; align-items:center;">
                <span onclick="document.getElementById('file-post').click()" style="cursor:pointer; font-size:24px;">🖼️</span>
                <input type="file" id="file-post" hidden accept="image/*" onchange="uploadImg(this, 'post')">
                <button class="btn-blue" style="width:80px;" onclick="publish()">发布</button>
            </div>
        </div>
        <div id="feed"></div>
    </div>

    <div id="page-me" class="page container">
        <div class="card" style="text-align:center; padding:30px 0;">
            <img id="my-big-head" class="u-head" style="width:85px; height:85px; margin:0 auto 10px;">
            <h2 id="my-name" style="margin:5px 0;"></h2>
            <p style="font-size:13px; color:#999;">欢迎回来，在这里管理你的社交动态</p>
            <button onclick="logout()" style="margin-top:15px; border:none; background:none; color:#ff7675; cursor:pointer;">退出登录</button>
        </div>
        <h4 style="margin:20px 0 10px;">我的足迹</h4>
        <div id="my-feed"></div>
    </div>

    <div class="tab-bar">
        <div class="tab-item" onclick="switchPage('chat')"><span>💬</span>消息</div>
        <div class="tab-item active" onclick="switchPage('hub')"><span>🏛️</span>广场</div>
        <div class="tab-item" onclick="switchPage('me')"><span>👤</span>我</div>
    </div>
</div>

<div id="chat-window" class="hidden" style="position:fixed; top:0; left:0; right:0; bottom:0; background:#f0f2f5; z-index:3000; display:flex; flex-direction:column;">
    <div style="background:#fff; padding:15px; display:flex; align-items:center; border-bottom:1px solid #eee;">
        <span onclick="closeChat()" style="cursor:pointer; margin-right:15px; font-size:20px;">🏠</span>
        <b id="chat-target-name">对方昵称</b>
    </div>
    <div id="chat-msgs" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>
    <div style="padding:10px; background:#fff; display:flex; gap:10px;">
        <input id="chat-input" class="in-field" style="margin:0;" placeholder="发送私信...">
        <button class="btn-blue" style="width:70px;" onclick="sendMsg()">发送</button>
    </div>
</div>

<script>
    const sb = supabase.createClient("https://ljopokentjagtxwdlzma.supabase.co", "sb_publishable_OgGGB2YH9O8rv0Vg3K8jEA_rbxA7ZHk");
    let me = null, tempPostImg = "", chatTarget = null;

    window.onload = () => {
        const saved = localStorage.getItem('v9_pro_fix');
        if(saved) { me = JSON.parse(saved); initApp(); }
    };

    function doLogin() {
        const u = document.getElementById('login-u').value.trim();
        const p = document.getElementById('login-p').value.trim();
        if(!u || !p) return alert("请设置昵称和密码");
        me = { name: u, pass: p, avatar: document.getElementById('a-img').src };
        localStorage.setItem('v9_pro_fix', JSON.stringify(me));
        initApp();
    }

    function initApp() {
        document.getElementById('page-auth').classList.add('hidden');
        document.getElementById('app-content').classList.remove('hidden');
        document.getElementById('my-name').innerText = me.name;
        document.getElementById('my-big-head').src = me.avatar || '';
        refreshAll();
        setInterval(loadChats, 5000);
    }

    function switchPage(p) {
        document.querySelectorAll('.page').forEach(e => e.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(e => e.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        event.currentTarget.classList.add('active');
        refreshAll();
    }

    function uploadImg(input, mode) {
        if (!input.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const maxW = mode === 'me' ? 120 : 600;
                canvas.width = maxW; canvas.height = img.height * (maxW/img.width);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const b64 = canvas.toDataURL('image/jpeg', 0.6);
                if(mode === 'me') {
                    document.getElementById('a-img').src = b64;
                    document.getElementById('a-img').classList.remove('hidden');
                    document.getElementById('a-plus').classList.add('hidden');
                } else {
                    tempPostImg = b64;
                    document.getElementById('pre-img').src = b64;
                    document.getElementById('post-pre').classList.remove('hidden');
                }
            };
        };
        reader.readAsDataURL(input.files[0]);
    }

    async function publish() {
        const txt = document.getElementById('post-txt').value.trim();
        if(!txt && !tempPostImg) return;
        const { error } = await sb.from('posts').insert([{ 
            username: me.name, content: txt, avatar: me.avatar, 
            post_img: tempPostImg, user_id: me.name
        }]);
        if(error) alert("发布失败：" + error.message);
        else {
            document.getElementById('post-txt').value = "";
            tempPostImg = ""; document.getElementById('post-pre').classList.add('hidden');
            refreshAll();
        }
    }

    async function refreshAll() {
        const { data: posts } = await sb.from('posts').select('*').order('id', {ascending:false});
        const { data: cmts } = await sb.from('comments').select('*').order('id', {ascending:true});
        
        const render = (p) => {
            const isAdm = p.username === "何梓晨";
            const myCmts = (cmts || []).filter(c => c.post_id === p.id);
            const avatar = p.avatar && p.avatar.length > 50 ? p.avatar : 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=';
            return `
                <div class="card">
                    <div class="u-info" onclick="openPrivateChat('${p.username}')" style="cursor:pointer">
                        <img src="${avatar}" class="u-head">
                        <div style="flex:1"><b>${p.username}</b>${isAdm?'<span class="admin-tag">管理员</span>':''}</div>
                        <div style="color:var(--primary); font-size:12px;">💬 私信</div>
                    </div>
                    <div style="font-size:15px; line-height:1.6;">${p.content}</div>
                    ${p.post_img ? `<img src="${p.post_img}" style="width:100%; border-radius:10px; margin-top:10px;" onclick="window.open(this.src)">` : ''}
                    <div style="margin-top:12px; font-size:13px; color:#666; display:flex; gap:15px;">
                        <span onclick="doCmt(${p.id})">💬 评论 (${myCmts.length})</span>
                    </div>
                </div>`;
        };
        document.getElementById('feed').innerHTML = (posts || []).map(render).join('') || "暂无动态";
        document.getElementById('my-feed').innerHTML = (posts || []).filter(p => p.username === me.name).map(render).join('') || "你还没发过动态哦";
        loadChats();
    }

    async function openPrivateChat(target) {
        if(target === me.name) return;
        chatTarget = target;
        document.getElementById('chat-target-name').innerText = target;
        document.getElementById('chat-window').classList.remove('hidden');
        loadPrivateMsgs();
    }

    async function loadPrivateMsgs() {
        if(!chatTarget) return;
        const { data } = await sb.from('messages')
            .select('*')
            .or(`and(sender.eq."${me.name}",receiver.eq."${chatTarget}"),and(sender.eq."${chatTarget}",receiver.eq."${me.name}")`)
            .order('id', {ascending:true});
        
        document.getElementById('chat-msgs').innerHTML = (data || []).map(m => `
            <div class="msg-bubble ${m.sender === me.name ? 'msg-mine' : 'msg-other'}">${m.content}</div>
        `).join('');
        const box = document.getElementById('chat-msgs');
        box.scrollTop = box.scrollHeight;
    }

    async function sendMsg() {
        const c = document.getElementById('chat-input').value.trim();
        if(!c) return;
        await sb.from('messages').insert([{ sender: me.name, receiver: chatTarget, content: c }]);
        document.getElementById('chat-input').value = "";
        loadPrivateMsgs();
    }

    async function loadChats() {
        const { data } = await sb.from('messages').select('*').or(`sender.eq."${me.name}",receiver.eq."${me.name}"`).order('id', {ascending:false});
        if(!data) return;
        const users = [...new Set(data.map(m => m.sender === me.name ? m.receiver : m.sender))];
        document.getElementById('chat-session-list').innerHTML = users.map(u => `
            <div class="card" onclick="openPrivateChat('${u}')" style="display:flex; align-items:center; padding:12px;">
                <div class="u-head" style="display:flex;align-items:center;justify-content:center;font-size:20px;background:#ddd;">👤</div>
                <b>${u}</b>
            </div>
        `).join('') || "暂无聊天记录";
    }

    function closeChat() { document.getElementById('chat-window').classList.add('hidden'); chatTarget = null; }
    function logout() { localStorage.clear(); location.reload(); }
    async function doCmt(pid) {
        let val = prompt("写下你的评论...");
        if(val) { await sb.from('comments').insert([{ post_id: pid, content: val, username: me.name }]); refreshAll(); }
    }
</script>
</body>
</html>
